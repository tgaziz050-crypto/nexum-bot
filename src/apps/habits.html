<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Habits · NEXUM</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{--bg:#0d0d0d;--sf:#161616;--br:#222;--tx:#fff;--mu:rgba(255,255,255,.38);
  --ac:#fff;--or:#FF9F0A;--pk:#FF375F;--r:16px;--st:env(safe-area-inset-top,0px)}
[data-theme=light]{--bg:#f5f5f7;--sf:#fff;--br:#e5e5e5;--tx:#0d0d0d;--mu:rgba(0,0,0,.4);--ac:#0d0d0d}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:var(--bg);color:var(--tx);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif}
.top{display:flex;align-items:center;padding:calc(var(--st)+16px) 20px 14px;gap:12px}
.bk{width:32px;height:32px;border-radius:9px;border:1px solid var(--br);background:var(--sf);
  display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer}
.bk:active{opacity:.6}
.ttl{font-size:18px;font-weight:700;flex:1;letter-spacing:-.3px}

.streak-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 16px 18px}
.streak-card{background:var(--sf);border:1px solid var(--br);border-radius:var(--r);
  padding:16px;text-align:center}
.streak-ic{font-size:22px;margin-bottom:4px}
.streak-val{font-size:28px;font-weight:800;letter-spacing:-1px;line-height:1}
.streak-lbl{font-size:11px;color:var(--mu);margin-top:4px;letter-spacing:.3px}

.sec-hdr{font-size:11px;color:var(--mu);letter-spacing:1px;font-weight:600;
  text-transform:uppercase;margin:0 16px 10px}
.list{padding:0 16px 80px;display:flex;flex-direction:column;gap:8px}
.hab{display:flex;align-items:center;gap:14px;padding:15px;
  background:var(--sf);border:1px solid var(--br);border-radius:var(--r)}
.hab-ic{font-size:26px;width:44px;text-align:center;flex-shrink:0}
.hab-info{flex:1}
.hab-nm{font-size:15px;font-weight:600;letter-spacing:-.1px}
.hab-st{font-size:12px;color:var(--or);margin-top:2px}
.dots{display:flex;gap:4px;margin-top:6px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--br)}
.dot.on{background:var(--ac)}
[data-theme=light] .dot{background:#e0e0e0}
.hab-chk{width:30px;height:30px;border-radius:50%;border:2px solid var(--br);
  display:flex;align-items:center;justify-content:center;font-size:14px;
  flex-shrink:0;transition:all.2s}
.hab.done .hab-chk{background:var(--ac);border-color:var(--ac);color:var(--bg)}
.empty{text-align:center;padding:60px 20px;color:var(--mu)}
.ei{font-size:44px;margin-bottom:14px}.et{font-size:14px}.eh{font-size:12px;margin-top:8px;opacity:.6}
.spin-w{display:flex;align-items:center;justify-content:center;height:200px}
.spin{width:28px;height:28px;border:2px solid var(--br);border-top-color:var(--ac);
  border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="top">
  <div class="bk" onclick="goHub()">←</div>
  <div class="ttl">🎯 Habits</div>
</div>
<div id="root"><div class="spin-w"><div class="spin"></div></div></div>
<script>
const tg=window.Telegram?.WebApp;tg?.ready();tg?.expand();
const dark=!tg?.colorScheme||tg.colorScheme==='dark';
document.documentElement.setAttribute('data-theme',dark?'dark':'light');
tg?.setHeaderColor(dark?'#0d0d0d':'#f5f5f7');
const p=new URLSearchParams(location.search);
const uid=p.get('uid'),token=p.get('token');
function goHub(){location.href=`/hub?uid=${uid}&token=${token}`}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')}

async function load(){
  if(!uid||!token){render([]);return}
  try{
    const r=await fetch(`/api/habits?uid=${uid}&token=${token}`);
    if(!r.ok)throw 0;
    render(await r.json());
  }catch{render([])}
}

function render(habits){
  if(!habits.length){
    document.getElementById('root').innerHTML=`
      <div class="empty"><div class="ei">🎯</div>
      <div class="et">Привычек пока нет</div>
      <div class="eh">Скажи боту: "Добавь привычку..."</div></div>`;
    return;
  }
  const maxStr=habits.reduce((m,h)=>Math.max(m,h.streak||0),0);
  const todayDone=habits.filter(h=>h.done_today||h.completedToday).length;
  const icons=['💪','📚','🏃','💧','🧘','😴','🍎','✍️','🎵','🧠'];
  document.getElementById('root').innerHTML=`
    <div class="streak-row">
      <div class="streak-card">
        <div class="streak-ic">🔥</div>
        <div class="streak-val">${maxStr}</div>
        <div class="streak-lbl">Лучшая серия</div>
      </div>
      <div class="streak-card">
        <div class="streak-ic">📅</div>
        <div class="streak-val">${todayDone}/${habits.length}</div>
        <div class="streak-lbl">Сегодня</div>
      </div>
    </div>
    <div class="sec-hdr">Мои привычки</div>
    <div class="list">${habits.map((h,i)=>{
      const done=h.done_today||h.completedToday;
      const last7=h.last7||Array(7).fill(0);
      return`<div class="hab${done?' done':''}">
        <div class="hab-ic">${h.emoji||icons[i%icons.length]}</div>
        <div class="hab-info">
          <div class="hab-nm">${esc(h.name||'')}</div>
          <div class="hab-st">🔥 ${h.streak||0} дней</div>
          <div class="dots">${last7.map(d=>`<div class="dot${d?' on':''}"></div>`).join('')}</div>
        </div>
        <div class="hab-chk">${done?'✓':''}</div>
      </div>`;}).join('')}
    </div>`;
}
load();
</script>
</body>
</html>
