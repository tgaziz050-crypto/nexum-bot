<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>NEXUM</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --bg:#0d0d0d; --surface:#161616; --border:#222;
  --accent:#fff; --accent-dim:rgba(255,255,255,.06);
  --text:#fff; --muted:rgba(255,255,255,.38);
  --r:18px; --safe-top:env(safe-area-inset-top,0px);
}
[data-theme=light] {
  --bg:#f5f5f5; --surface:#fff; --border:#e8e8e8;
  --accent:#0d0d0d; --accent-dim:rgba(0,0,0,.04);
  --text:#0d0d0d; --muted:rgba(0,0,0,.38);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',system-ui,sans-serif}

.header{padding:calc(var(--safe-top) + 32px) 24px 0;text-align:center}

/* SVG logo — exact shape from the brand */
.logo-svg{display:block;margin:0 auto 16px;width:52px;height:52px}
.logo-name{font-size:13px;font-weight:500;letter-spacing:5px;color:var(--muted);
  text-transform:uppercase;margin-bottom:4px}
.logo-sub{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;
  opacity:.6}

.theme-btn{position:absolute;top:calc(var(--safe-top) + 20px);right:20px;
  width:34px;height:34px;border-radius:10px;border:1px solid var(--border);
  background:var(--surface);cursor:pointer;display:flex;align-items:center;
  justify-content:center;font-size:16px;transition:opacity .15s}
.theme-btn:active{opacity:.6}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:36px 20px 32px}
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:24px 20px 22px;
  cursor:pointer;transition:transform .12s,background .12s;
  text-decoration:none;color:inherit;display:flex;flex-direction:column;gap:14px;
  position:relative;overflow:hidden
}
.card:active{transform:scale(.97);background:var(--accent-dim)}
.card-icon{font-size:26px;line-height:1}
.card-label{font-size:15px;font-weight:600;letter-spacing:-.2px}
.card-desc{font-size:12px;color:var(--muted);line-height:1.45}
.card-arrow{position:absolute;top:18px;right:18px;color:var(--muted);font-size:12px}

.footer{text-align:center;padding-bottom:28px;font-size:11px;
  color:var(--muted);letter-spacing:2px}
</style>
</head>
<body>
<div style="position:relative">
  <div class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</div>
  <div class="header">
    <svg class="logo-svg" viewBox="0 0 52 52" fill="none">
      <!-- N shape matching the logo exactly -->
      <rect width="52" height="52" rx="13" fill="var(--accent)"/>
      <path d="M12 38V14h5.5l13 16V14H36v24h-5.5l-13-16v16H12z"
            fill="var(--bg)" stroke="none"/>
    </svg>
    <div class="logo-name">N E X U M</div>
    <div class="logo-sub">Autonomous AI Agent</div>
  </div>
</div>

<div class="grid">
  <a class="card" href="javascript:void(0)" onclick="go('/')">
    <div class="card-icon">💰</div>
    <div>
      <div class="card-label">Finance</div>
      <div class="card-desc">Расходы и доходы</div>
    </div>
    <span class="card-arrow">›</span>
  </a>
  <a class="card" href="javascript:void(0)" onclick="go('/notes')">
    <div class="card-icon">📝</div>
    <div>
      <div class="card-label">Notes</div>
      <div class="card-desc">Заметки и идеи</div>
    </div>
    <span class="card-arrow">›</span>
  </a>
  <a class="card" href="javascript:void(0)" onclick="go('/tasks')">
    <div class="card-icon">✅</div>
    <div>
      <div class="card-label">Tasks</div>
      <div class="card-desc">Задачи</div>
    </div>
    <span class="card-arrow">›</span>
  </a>
  <a class="card" href="javascript:void(0)" onclick="go('/habits')">
    <div class="card-icon">🎯</div>
    <div>
      <div class="card-label">Habits</div>
      <div class="card-desc">Привычки</div>
    </div>
    <span class="card-arrow">›</span>
  </a>
</div>

<div class="footer">NEXUM · 2025</div>

<script>
const tg = window.Telegram?.WebApp;
tg?.ready(); tg?.expand();

const p = new URLSearchParams(location.search);
const uid = p.get('uid'), token = p.get('token');
const q = uid ? `?uid=${uid}&token=${token}` : '';

// Theme detection: follow Telegram theme
let dark = true;
if (tg?.colorScheme) dark = tg.colorScheme === 'dark';
else dark = window.matchMedia('(prefers-color-scheme:dark)').matches;
applyTheme(dark);

function applyTheme(d) {
  dark = d;
  document.documentElement.setAttribute('data-theme', d ? 'dark' : 'light');
  document.getElementById('themeBtn').textContent = d ? '☀️' : '🌙';
  tg?.setHeaderColor(d ? '#0d0d0d' : '#f5f5f5');
  tg?.setBackgroundColor(d ? '#0d0d0d' : '#f5f5f5');
}
function toggleTheme() { applyTheme(!dark); }
function go(path) { location.href = path + q; }
</script>
</body>
</html>
