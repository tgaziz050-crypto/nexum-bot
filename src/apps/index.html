<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Finance · NEXUM</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{--bg:#0d0d0d;--surface:#161616;--surface2:#1e1e1e;--border:#222;
  --accent:#fff;--text:#fff;--muted:rgba(255,255,255,.38);
  --green:#34C759;--red:#FF453A;--r:16px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px)}
[data-theme=light]{--bg:#f5f5f7;--surface:#fff;--surface2:#f0f0f0;--border:#e5e5e5;
  --accent:#0d0d0d;--text:#0d0d0d;--muted:rgba(0,0,0,.4);--green:#28a745;--red:#dc3545}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif}

.topbar{display:flex;align-items:center;padding:calc(var(--safe-top)+16px) 20px 12px;gap:12px}
.back-btn{width:32px;height:32px;border-radius:9px;border:1px solid var(--border);
  background:var(--surface);display:flex;align-items:center;justify-content:center;
  font-size:16px;cursor:pointer;flex-shrink:0;transition:opacity.15s}
.back-btn:active{opacity:.6}
.page-ttl{font-size:18px;font-weight:700;letter-spacing:-.3px;flex:1}

/* Balance hero */
.hero{margin:0 16px 20px;border-radius:22px;padding:26px 24px;
  background:var(--surface);border:1px solid var(--border);position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;
  border-radius:50%;background:rgba(255,255,255,.025)}
.hero-lbl{font-size:12px;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px}
.hero-amt{font-size:40px;font-weight:700;letter-spacing:-2px;line-height:1}
.hero-period{font-size:12px;color:var(--muted);margin-top:6px}

.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 16px 20px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.stat-lbl{font-size:11px;color:var(--muted);letter-spacing:.5px;margin-bottom:6px}
.stat-val{font-size:22px;font-weight:700;letter-spacing:-.5px}
.stat-val.g{color:var(--green)}.stat-val.r{color:var(--red)}

.sec{margin:0 16px 16px}
.sec-hdr{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;
  font-weight:600;margin-bottom:10px}
.txlist{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.tx{display:flex;align-items:center;gap:12px;padding:13px 16px;
  border-bottom:1px solid var(--border)}
.tx:last-child{border-bottom:none}
.tx-ic{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.05);
  display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
[data-theme=light] .tx-ic{background:rgba(0,0,0,.04)}
.tx-nm{font-size:14px;font-weight:500;letter-spacing:-.1px}
.tx-dt{font-size:11px;color:var(--muted);margin-top:2px}
.tx-am{font-size:14px;font-weight:600}
.tx-am.i{color:var(--green)}.tx-am.e{color:var(--red)}

.empty{text-align:center;padding:56px 20px;color:var(--muted)}
.empty-ic{font-size:44px;margin-bottom:14px}
.empty-tx{font-size:14px;line-height:1.6}
.empty-hint{font-size:12px;margin-top:8px;opacity:.6}
.spin-wrap{display:flex;align-items:center;justify-content:center;height:220px}
.spin{width:28px;height:28px;border:2px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="topbar">
  <div class="back-btn" onclick="goHub()">←</div>
  <div class="page-ttl">💰 Finance</div>
</div>
<div id="root"><div class="spin-wrap"><div class="spin"></div></div></div>

<script>
const tg=window.Telegram?.WebApp;
tg?.ready();tg?.expand();
const dark=!tg?.colorScheme||tg.colorScheme==='dark';
document.documentElement.setAttribute('data-theme',dark?'dark':'light');
tg?.setHeaderColor(dark?'#0d0d0d':'#f5f5f7');
tg?.setBackgroundColor(dark?'#0d0d0d':'#f5f5f7');

const p=new URLSearchParams(location.search);
const uid=p.get('uid'),token=p.get('token');
function goHub(){location.href=`/hub?uid=${uid}&token=${token}`}
function n(v){return new Intl.NumberFormat('ru-RU').format(Math.round(v||0))}

async function load(){
  if(!uid||!token){show404();return}
  try{
    const r=await fetch(`/api/data?uid=${uid}&token=${token}`);
    if(!r.ok)throw 0;
    const d=await r.json();
    render(d);
  }catch{showEmpty()}
}

function render(d){
  const bal=(d.income||0)-(d.expense||0);
  const txs=(d.recentTx||[]).slice(0,10);
  const mo=new Date().toLocaleString('ru',{month:'long',year:'numeric'});
  document.getElementById('root').innerHTML=`
  <div class="hero">
    <div class="hero-lbl">Баланс</div>
    <div class="hero-amt">${n(bal)} ₽</div>
    <div class="hero-period">${mo}</div>
  </div>
  <div class="row2">
    <div class="stat"><div class="stat-lbl">Доходы</div><div class="stat-val g">+${n(d.income)}</div></div>
    <div class="stat"><div class="stat-lbl">Расходы</div><div class="stat-val r">-${n(d.expense)}</div></div>
  </div>
  <div class="sec">
    <div class="sec-hdr">Последние операции</div>
    <div class="txlist">${txs.length?txs.map(t=>`
      <div class="tx">
        <div class="tx-ic">${t.type==='income'?'⬆️':'⬇️'}</div>
        <div style="flex:1">
          <div class="tx-nm">${esc(t.description||t.category||'Операция')}</div>
          <div class="tx-dt">${new Date(t.created_at||t.date||0).toLocaleDateString('ru')}</div>
        </div>
        <div class="tx-am ${t.type==='income'?'i':'e'}">${t.type==='income'?'+':'-'}${n(t.amount)}</div>
      </div>`).join(''):
      `<div class="empty"><div class="empty-ic">📊</div>
       <div class="empty-tx">Транзакций нет</div>
       <div class="empty-hint">Скажи боту: "Потратил 500 на кофе"</div></div>`}
    </div>
  </div>`;
}

function showEmpty(){
  document.getElementById('root').innerHTML=`
    <div class="empty"><div class="empty-ic">💰</div>
    <div class="empty-tx">Данных пока нет</div>
    <div class="empty-hint">Скажи боту: "Потратил 500 на кофе"</div></div>`;
}
function show404(){
  document.getElementById('root').innerHTML=`
    <div class="empty"><div class="empty-ic">🔒</div>
    <div class="empty-tx">Открой через бота</div></div>`;
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')}
load();
</script>
</body>
</html>
