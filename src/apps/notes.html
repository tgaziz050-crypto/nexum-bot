<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Notes · NEXUM</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{--bg:#0d0d0d;--sf:#161616;--br:#222;--tx:#fff;--mu:rgba(255,255,255,.38);
  --ac:#fff;--r:16px;--st:env(safe-area-inset-top,0px)}
[data-theme=light]{--bg:#f5f5f7;--sf:#fff;--br:#e5e5e5;--tx:#0d0d0d;--mu:rgba(0,0,0,.4);--ac:#0d0d0d}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:var(--bg);color:var(--tx);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif}
.top{display:flex;align-items:center;padding:calc(var(--st)+16px) 20px 12px;gap:12px}
.bk{width:32px;height:32px;border-radius:9px;border:1px solid var(--br);
  background:var(--sf);display:flex;align-items:center;justify-content:center;
  font-size:16px;cursor:pointer;transition:opacity.15s}
.bk:active{opacity:.6}
.ttl{font-size:18px;font-weight:700;flex:1;letter-spacing:-.3px}
.cnt{background:rgba(255,255,255,.08);border-radius:20px;padding:3px 9px;
  font-size:11px;font-weight:600;color:var(--mu)}
[data-theme=light] .cnt{background:rgba(0,0,0,.06)}
.search{margin:0 16px 14px;position:relative}
.search input{width:100%;padding:11px 14px 11px 36px;border-radius:12px;
  border:1px solid var(--br);background:var(--sf);color:var(--tx);font-size:14px;
  outline:none;-webkit-appearance:none}
.search::before{content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px}
.list{padding:0 16px 80px;display:flex;flex-direction:column;gap:8px}
.card{background:var(--sf);border:1px solid var(--br);border-radius:var(--r);
  padding:15px;cursor:pointer;transition:transform .12s}
.card:active{transform:scale(.98)}
.card-tx{font-size:14px;line-height:1.55;letter-spacing:-.1px;
  display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
.card-dt{font-size:11px;color:var(--mu);margin-top:8px}
.empty{text-align:center;padding:70px 20px;color:var(--mu)}
.ei{font-size:44px;margin-bottom:14px}
.et{font-size:14px;line-height:1.6}
.eh{font-size:12px;margin-top:8px;opacity:.6}
.spin-w{display:flex;align-items:center;justify-content:center;height:200px}
.spin{width:28px;height:28px;border:2px solid var(--br);
  border-top-color:var(--ac);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="top">
  <div class="bk" onclick="goHub()">←</div>
  <div class="ttl">📝 Notes</div>
  <span class="cnt" id="cnt" style="display:none"></span>
</div>
<div class="search"><input id="srch" placeholder="Поиск заметок..." oninput="filter(this.value)"></div>
<div id="root"><div class="spin-w"><div class="spin"></div></div></div>

<script>
const tg=window.Telegram?.WebApp;
tg?.ready();tg?.expand();
const dark=!tg?.colorScheme||tg.colorScheme==='dark';
document.documentElement.setAttribute('data-theme',dark?'dark':'light');
tg?.setHeaderColor(dark?'#0d0d0d':'#f5f5f7');
const p=new URLSearchParams(location.search);
const uid=p.get('uid'),token=p.get('token');
let all=[];
function goHub(){location.href=`/hub?uid=${uid}&token=${token}`}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')}
function fmt(d){return new Date(d||0).toLocaleString('ru',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}

async function load(){
  if(!uid||!token){render([]);return}
  try{
    const r=await fetch(`/api/notes?uid=${uid}&token=${token}`);
    if(!r.ok)throw 0;
    all=await r.json();
    if(all.length){document.getElementById('cnt').textContent=all.length;document.getElementById('cnt').style.display=''}
    render(all);
  }catch{render([])}
}

function render(notes){
  document.getElementById('root').innerHTML=notes.length?
    `<div class="list">${notes.map(n=>`
      <div class="card">
        <div class="card-tx">${esc(n.text||n.content||'')}</div>
        <div class="card-dt">${fmt(n.created_at||n.date)}</div>
      </div>`).join('')}</div>`:
    `<div class="empty"><div class="ei">📝</div>
     <div class="et">Заметок пока нет</div>
     <div class="eh">Скажи боту: "Запиши идею..."</div></div>`;
}

function filter(q){
  const v=q.toLowerCase();
  render(v?all.filter(n=>(n.text||n.content||'').toLowerCase().includes(v)):all);
}
load();
</script>
</body>
</html>
