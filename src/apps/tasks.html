<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Tasks · NEXUM</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{--bg:#0d0d0d;--sf:#161616;--br:#222;--tx:#fff;--mu:rgba(255,255,255,.38);
  --ac:#fff;--gn:#34C759;--r:16px;--st:env(safe-area-inset-top,0px)}
[data-theme=light]{--bg:#f5f5f7;--sf:#fff;--br:#e5e5e5;--tx:#0d0d0d;--mu:rgba(0,0,0,.4);--ac:#0d0d0d;--gn:#28a745}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:var(--bg);color:var(--tx);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif}
.top{display:flex;align-items:center;padding:calc(var(--st)+16px) 20px 14px;gap:12px}
.bk{width:32px;height:32px;border-radius:9px;border:1px solid var(--br);background:var(--sf);
  display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer}
.bk:active{opacity:.6}
.ttl{font-size:18px;font-weight:700;flex:1;letter-spacing:-.3px}
.tabs{display:flex;gap:0;margin:0 16px 16px;background:var(--sf);
  border:1px solid var(--br);border-radius:12px;padding:3px;overflow:hidden}
.tab{flex:1;text-align:center;padding:8px 4px;border-radius:9px;font-size:13px;
  font-weight:600;cursor:pointer;color:var(--mu);transition:all .2s}
.tab.on{background:var(--bg);color:var(--tx);border:1px solid var(--br)}
[data-theme=light] .tab.on{background:var(--bg)}
.list{padding:0 16px 80px;display:flex;flex-direction:column;gap:8px}
.item{display:flex;align-items:center;gap:12px;padding:14px 14px;
  background:var(--sf);border:1px solid var(--br);border-radius:var(--r);
  cursor:pointer;transition:opacity.2s}
.item.dn{opacity:.45}
.chk{width:22px;height:22px;border-radius:50%;border:2px solid var(--br);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:11px;transition:all.2s}
.item.dn .chk{background:var(--gn);border-color:var(--gn);color:#fff}
.it-tx{font-size:14px;font-weight:500;letter-spacing:-.1px;flex:1}
.item.dn .it-tx{text-decoration:line-through;color:var(--mu)}
.it-dt{font-size:11px;color:var(--mu);margin-top:2px}
.empty{text-align:center;padding:60px 20px;color:var(--mu)}
.ei{font-size:44px;margin-bottom:14px}.et{font-size:14px}.eh{font-size:12px;margin-top:8px;opacity:.6}
.spin-w{display:flex;align-items:center;justify-content:center;height:200px}
.spin{width:28px;height:28px;border:2px solid var(--br);border-top-color:var(--ac);
  border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="top">
  <div class="bk" onclick="goHub()">←</div>
  <div class="ttl">✅ Tasks</div>
</div>
<div class="tabs">
  <div class="tab on" onclick="setTab('active',this)">Активные</div>
  <div class="tab" onclick="setTab('done',this)">Выполнено</div>
  <div class="tab" onclick="setTab('all',this)">Все</div>
</div>
<div id="root"><div class="spin-w"><div class="spin"></div></div></div>
<script>
const tg=window.Telegram?.WebApp;tg?.ready();tg?.expand();
const dark=!tg?.colorScheme||tg.colorScheme==='dark';
document.documentElement.setAttribute('data-theme',dark?'dark':'light');
tg?.setHeaderColor(dark?'#0d0d0d':'#f5f5f7');
const p=new URLSearchParams(location.search);
const uid=p.get('uid'),token=p.get('token');
let all=[],cur='active';
function goHub(){location.href=`/hub?uid=${uid}&token=${token}`}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')}
function setTab(t,el){
  cur=t;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  el.classList.add('on');render(all,t);
}
async function load(){
  if(!uid||!token){render([]);return}
  try{
    const r=await fetch(`/api/tasks?uid=${uid}&token=${token}`);
    if(!r.ok)throw 0;
    all=await r.json();render(all,'active');
  }catch{render([],'active')}
}
function render(tasks,f){
  const list=f==='all'?tasks:tasks.filter(t=>f==='done'?(t.done||t.completed):((!t.done&&!t.completed)));
  document.getElementById('root').innerHTML=list.length?
    `<div class="list">${list.map(t=>`
      <div class="item${(t.done||t.completed)?' dn':''}">
        <div class="chk">${(t.done||t.completed)?'✓':''}</div>
        <div style="flex:1">
          <div class="it-tx">${esc(t.text||t.title||'')}</div>
          <div class="it-dt">${new Date(t.created_at||t.date||0).toLocaleDateString('ru')}</div>
        </div>
      </div>`).join('')}</div>`:
    `<div class="empty"><div class="ei">${f==='done'?'🎉':'✅'}</div>
     <div class="et">${f==='done'?'Выполненных нет':'Задач нет'}</div>
     ${f!=='done'?`<div class="eh">Скажи боту: "Добавь задачу..."</div>`:''}
    </div>`;
}
load();
</script>
</body>
</html>
