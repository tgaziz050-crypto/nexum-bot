<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20viewBox%3D%270%200%2032%2032%27%3E%3Crect%20width%3D%2732%27%20height%3D%2732%27%20rx%3D%277%27%20fill%3D%27black%27/%3E%3Cpath%20d%3D%27M6%2027L6%205C6%205%207%204%208%204L11%204C12%204%2013%205%2013%205L13%2017L19%205C20%204%2021%204%2022%204L24%204C25%204%2026%205%2026%205L26%2027C26%2027%2025%2028%2024%2028L21%2028C20%2028%2019%2027%2019%2027L19%2015L13%2027C12%2028%2011%2028%2010%2028L8%2028C7%2028%206%2027%206%2027Z%27%20fill%3D%27white%27/%3E%3C/svg%3E">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>NEXUM Finance</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
/* ── NEXUM Design System ── Black/White like logo, Apple typography ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#000;--bg2:#111;--bg3:#1c1c1e;--bg4:#2c2c2e;
  --fg:#fff;--fg2:rgba(255,255,255,0.6);--fg3:rgba(255,255,255,0.3);
  --sep:rgba(255,255,255,0.08);
  --accent:#fff;--accent-bg:rgba(255,255,255,0.1);
  --red:#ff453a;--green:#30d158;--blue:#0a84ff;
  --r:16px;--r2:12px;
  --font:-apple-system,'SF Pro Display',system-ui,sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--fg);font-family:var(--font);-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{display:none;}

/* Header */
.hdr{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;}
.hdr-logo{display:flex;align-items:center;gap:10px;}


.hdr-title{font-size:18px;font-weight:700;letter-spacing:-0.5px;}
.hdr-right{display:flex;gap:10px;align-items:center;}
.icon-btn{width:34px;height:34px;border-radius:50%;background:var(--bg3);border:none;color:var(--fg);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;}

/* Period selector */
.period-bar{display:flex;gap:6px;padding:0 20px 16px;overflow-x:auto;}
.period-btn{padding:6px 14px;border-radius:20px;border:none;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;background:var(--bg3);color:var(--fg2);}
.period-btn.act{background:var(--fg);color:#000;}

/* Account cards */
.accounts-scroll{padding:0 20px 20px;display:flex;gap:12px;overflow-x:auto;}
.acct-card{min-width:160px;background:var(--bg3);border-radius:var(--r);padding:14px 16px;flex-shrink:0;cursor:pointer;position:relative;overflow:hidden;}
.acct-card.add{border:1.5px dashed var(--sep);background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--fg3);}
.acct-icon{width:36px;height:36px;border-radius:10px;background:var(--fg);display:flex;align-items:center;justify-content:center;margin-bottom:10px;}
.acct-icon.dark{background:var(--bg4);}
.acct-icon svg,.acct-icon span{font-size:18px;}
.acct-name{font-size:11px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;color:var(--fg2);margin-bottom:4px;}
.acct-bal{font-size:20px;font-weight:700;letter-spacing:-0.5px;}
.acct-cur{font-size:11px;color:var(--fg2);}

/* Summary cards */
.summary{padding:0 20px 20px;display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.sum-card{background:var(--bg3);border-radius:var(--r);padding:14px 16px;}
.sum-label{font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--fg2);margin-bottom:6px;}
.sum-val{font-size:22px;font-weight:700;letter-spacing:-0.8px;}
.sum-val.pos{color:var(--green);}
.sum-val.neg{color:var(--red);}

/* Section */
.section{padding:0 20px 8px;}
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.sec-title{font-size:16px;font-weight:700;letter-spacing:-0.3px;}
.sec-link{font-size:14px;color:var(--fg2);}

/* Top expenses */
.expense-bar-list{background:var(--bg3);border-radius:var(--r);overflow:hidden;}
.exp-row{padding:14px 16px;border-bottom:0.5px solid var(--sep);}
.exp-row:last-child{border:none;}
.exp-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
.exp-cat{font-size:14px;font-weight:500;}
.exp-amt{font-size:14px;font-weight:600;color:var(--red);}
.bar-track{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;}
.bar-fill{height:100%;background:#fff;border-radius:2px;transition:width 0.6s ease;}

/* Transactions */
.tx-list{background:var(--bg3);border-radius:var(--r);overflow:hidden;margin-bottom:20px;}
.tx-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:0.5px solid var(--sep);}
.tx-row:last-child{border:none;}
.tx-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.tx-body{flex:1;min-width:0;}
.tx-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tx-date{font-size:12px;color:var(--fg3);margin-top:2px;}
.tx-amt{font-size:15px;font-weight:600;text-align:right;}
.tx-amt.exp{color:var(--red);}
.tx-amt.inc{color:var(--green);}

/* FAB */
.fab{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);width:56px;height:56px;background:#fff;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 24px rgba(0,0,0,0.5);cursor:pointer;z-index:100;}
.fab svg{width:24px;height:24px;}

/* Bottom nav */
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,0.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:0.5px solid var(--sep);display:flex;padding:8px 0 max(env(safe-area-inset-bottom),12px);}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:none;background:none;color:var(--fg3);font-family:var(--font);}
.bnav-item.act{color:#fff;}
.bnav-icon{font-size:22px;}
.bnav-label{font-size:10px;font-weight:500;}

/* Sheet */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.overlay.open{opacity:1;pointer-events:all;}
.sheet{background:var(--bg2);border-radius:24px 24px 0 0;width:100%;padding-bottom:env(safe-area-inset-bottom,24px);transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);}
.overlay.open .sheet{transform:translateY(0);}
.sheet-handle{width:36px;height:4px;background:var(--bg4);border-radius:2px;margin:12px auto;}
.sheet-title{font-size:18px;font-weight:700;padding:4px 20px 16px;letter-spacing:-0.4px;}

/* Segmented control */
.seg{display:flex;background:var(--bg3);border-radius:12px;padding:3px;margin:0 20px 20px;}
.seg-btn{flex:1;padding:9px;border-radius:9px;border:none;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;background:transparent;color:var(--fg2);}
.seg-btn.act{background:#fff;color:#000;}

/* Form fields */
.amount-display{text-align:center;padding:20px;font-size:52px;font-weight:700;letter-spacing:-2px;cursor:pointer;}
.amount-display .cur{font-size:22px;font-weight:400;color:var(--fg2);margin-right:8px;vertical-align:middle;}
.field-row{display:flex;align-items:center;padding:14px 20px;border-top:0.5px solid var(--sep);cursor:pointer;}
.field-label{font-size:15px;flex:1;}
.field-val{font-size:15px;color:var(--fg2);}
.field-arr{color:var(--fg3);margin-left:6px;}

/* Numpad */
.numpad{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--sep);margin:0;}
.num-btn{background:var(--bg2);border:none;font-family:var(--font);font-size:22px;font-weight:400;color:var(--fg);padding:18px;cursor:pointer;transition:background 0.1s;}
.num-btn:active{background:var(--bg4);}
.num-btn.zero{grid-column:span 1;}
.save-btn{width:calc(100% - 40px);margin:16px 20px 0;padding:16px;background:#fff;color:#000;border:none;border-radius:14px;font-family:var(--font);font-size:16px;font-weight:700;cursor:pointer;}

/* Cat picker */
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:16px 20px 20px;}
.cat-item{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;}
.cat-circle{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;border:2px solid transparent;}
.cat-circle.sel{border-color:#fff;}
.cat-name{font-size:11px;color:var(--fg2);text-align:center;}

/* Lang/currency dropdown */
.dropdown-list{max-height:300px;overflow-y:auto;}
.drop-item{padding:14px 20px;border-bottom:0.5px solid var(--sep);cursor:pointer;font-size:15px;}
.drop-item:active{background:var(--bg3);}
.drop-item.sel{color:#fff;font-weight:600;}

.empty{text-align:center;padding:60px 20px;color:var(--fg2);}
.empty-icon{font-size:48px;opacity:0.3;display:block;margin-bottom:12px;}
.stats-grid{display:grid;grid-template-columns:1fr;gap:10px;padding:0 20px 20px;}
.stat-card{background:var(--bg3);border-radius:var(--r);padding:16px;}
.stat-label{font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--fg2);margin-bottom:8px;}
.stat-val{font-size:28px;font-weight:700;letter-spacing:-1px;}
.pb{height:100px;}
</style>
</head>
<body>

<!-- Header -->
<div class="hdr">
  <div class="hdr-logo">
    <span class="hdr-title" id="title-finance">Finance</span>
  </div>
  <div class="hdr-right">
    <button class="icon-btn" onclick="openSheet('lang-sheet')" title="Language">🌍</button>
    <button class="icon-btn" onclick="openSheet('cur-sheet')" title="Currency">💱</button>
  </div>
</div>

<!-- Period bar -->
<div class="period-bar" id="period-bar"></div>

<!-- Main content -->
<div id="page-dashboard">
  <!-- Accounts -->
  <div class="accounts-scroll" id="accounts-scroll">
    <div class="acct-card add" onclick="openSheet('add-acct-sheet')">
      <span style="font-size:24px">＋</span>
      <span style="font-size:12px" id="t-add-account">Add account</span>
    </div>
  </div>
  <!-- Summary -->
  <div class="summary">
    <div class="sum-card">
      <div class="sum-label" id="t-balance">BALANCE</div>
      <div class="sum-val" id="bal-val">—</div>
    </div>
    <div class="sum-card">
      <div class="sum-label" id="t-spending">SPENDING</div>
      <div class="sum-val neg" id="spend-val">—</div>
    </div>
    <div class="sum-card">
      <div class="sum-label" id="t-cashflow">CASH FLOW</div>
      <div class="sum-val" id="cf-val">—</div>
    </div>
    <div class="sum-card">
      <div class="sum-label" id="t-income">INCOME</div>
      <div class="sum-val pos" id="inc-val">—</div>
    </div>
  </div>
  <!-- Top expenses -->
  <div class="section">
    <div class="sec-header">
      <span class="sec-title" id="t-top-expenses">Top Expenses</span>
    </div>
    <div class="expense-bar-list" id="top-expenses"></div>
  </div>
  <!-- Last records -->
  <div class="section" style="margin-top:20px;">
    <div class="sec-header">
      <span class="sec-title" id="t-last-records">Last Records</span>
    </div>
    <div class="tx-list" id="tx-list"></div>
  </div>
  <div class="pb"></div>
</div>

<!-- Statistics page -->
<div id="page-stats" style="display:none;">
  <div class="stats-grid" id="stats-grid"></div>
  <div class="pb"></div>
</div>

<!-- FAB -->
<button class="fab" onclick="openAddRecord()">
  <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round">
    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
  </svg>
</button>

<!-- Bottom nav -->
<div class="bnav">
  <button class="bnav-item act" onclick="switchPage('dashboard',this)" id="nav-dashboard">
    <span class="bnav-icon">💰</span>
    <span class="bnav-label" id="t-nav-dash">Dashboard</span>
  </button>
  <button class="bnav-item" onclick="switchPage('stats',this)">
    <span class="bnav-icon">📊</span>
    <span class="bnav-label" id="t-nav-stats">Statistics</span>
  </button>
</div>

<!-- ADD RECORD SHEET -->
<div class="overlay" id="add-sheet">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="seg" style="margin-top:4px;">
      <button class="seg-btn act" id="seg-exp" onclick="setType('expense')" id="t-expense">Expense</button>
      <button class="seg-btn" id="seg-inc" onclick="setType('income')" id="t-income-btn">Income</button>
      <button class="seg-btn" id="seg-tr" onclick="setType('transfer')" id="t-transfer">Transfer</button>
    </div>
    <!-- Currency + Amount -->
    <div style="display:flex;align-items:center;padding:0 20px 8px;gap:8px;">
      <button class="icon-btn" id="cur-picker-btn" onclick="openSheet('cur-sheet')" style="width:auto;border-radius:20px;padding:6px 14px;font-size:13px;font-weight:600;">UZS</button>
    </div>
    <div class="amount-display" id="amount-display"><span class="cur" id="cur-label">UZS</span><span id="amount-num">0</span></div>
    <!-- Fields -->
    <div class="field-row" onclick="openSheet('cat-sheet')">
      <span class="field-label" id="t-category">Category</span>
      <span class="field-val" id="cat-selected" style="color:var(--red)">Required</span>
      <span class="field-arr">›</span>
    </div>
    <div class="field-row" onclick="openSheet('acct-sheet')">
      <span class="field-label" id="t-account">Account</span>
      <span class="field-val" id="acct-selected">Cash</span>
      <span class="field-arr">›</span>
    </div>
    <div class="field-row">
      <span class="field-label" id="t-note-field">Note</span>
      <input id="note-input" style="background:none;border:none;text-align:right;color:var(--fg2);font-family:var(--font);font-size:15px;width:120px;outline:none;" placeholder="—">
    </div>
    <!-- Numpad -->
    <div class="numpad">
      <button class="num-btn" onclick="numpad('1')">1</button>
      <button class="num-btn" onclick="numpad('2')">2</button>
      <button class="num-btn" onclick="numpad('3')">3</button>
      <button class="num-btn" onclick="numpad('4')">4</button>
      <button class="num-btn" onclick="numpad('5')">5</button>
      <button class="num-btn" onclick="numpad('6')">6</button>
      <button class="num-btn" onclick="numpad('7')">7</button>
      <button class="num-btn" onclick="numpad('8')">8</button>
      <button class="num-btn" onclick="numpad('9')">9</button>
      <button class="num-btn" onclick="numpad('.')">.</button>
      <button class="num-btn" onclick="numpad('0')">0</button>
      <button class="num-btn" onclick="numpad('del')">⌫</button>
    </div>
    <button class="save-btn" id="t-save" onclick="saveRecord()">Save</button>
  </div>
</div>

<!-- CATEGORY SHEET -->
<div class="overlay" id="cat-sheet">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="t-categories">Categories</div>
    <div class="cat-grid" id="cat-grid"></div>
  </div>
</div>

<!-- ACCOUNT SHEET -->
<div class="overlay" id="acct-sheet">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="t-accounts">Accounts</div>
    <div id="acct-list-sheet"></div>
  </div>
</div>

<!-- CURRENCY SHEET -->
<div class="overlay" id="cur-sheet">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="t-currency">Currency</div>
    <div class="dropdown-list" id="cur-list"></div>
  </div>
</div>

<!-- LANG SHEET -->
<div class="overlay" id="lang-sheet">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Language</div>
    <div class="dropdown-list" id="lang-list"></div>
  </div>
</div>

<!-- ADD ACCOUNT SHEET -->
<div class="overlay" id="add-acct-sheet">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="t-add-acct">New Account</div>
    <div style="padding:0 20px;">
      <input id="acct-name-input" style="width:100%;background:var(--bg3);border:none;border-radius:12px;padding:14px;color:#fff;font-family:var(--font);font-size:16px;outline:none;margin-bottom:12px;" placeholder="Account name">
      <select id="acct-cur-sel" style="width:100%;background:var(--bg3);border:none;border-radius:12px;padding:14px;color:#fff;font-family:var(--font);font-size:15px;margin-bottom:16px;appearance:none;">
      </select>
      <button class="save-btn" style="margin:0;width:100%;" onclick="createAccount()">Create</button>
    </div>
    <div style="height:24px;"></div>
  </div>
</div>

<script>
const tg = window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();}

// ── UID auto-detect ──────────────────────────────────────────────
function getUID(){
  try{const u=tg?.initDataUnsafe?.user?.id;if(u)return u;}catch(e){}
  const p=new URLSearchParams(location.search);
  if(p.get('uid'))return parseInt(p.get('uid'));
  return 0;
}
const UID=getUID();

// ── i18n ─────────────────────────────────────────────────────────
const LANGS={
  en:{finance:'Finance',balance:'BALANCE',spending:'SPENDING',cashflow:'CASH FLOW',income:'INCOME',topExpenses:'Top Expenses',lastRecords:'Last Records',dashboard:'Dashboard',statistics:'Statistics',category:'Category',account:'Account',note:'Note',save:'Save',categories:'Categories',accounts:'Accounts',currency:'Currency',addAccount:'Add account',addAcct:'New Account',expense:'Expense',incomeBtn:'Income',transfer:'Transfer',required:'Required',noTx:'No transactions yet'},
  ru:{finance:'Финансы',balance:'БАЛАНС',spending:'РАСХОДЫ',cashflow:'ДЕНЕЖНЫЙ ПОТОК',income:'ДОХОДЫ',topExpenses:'Топ расходов',lastRecords:'Последние операции',dashboard:'Главная',statistics:'Статистика',category:'Категория',account:'Счёт',note:'Заметка',save:'Сохранить',categories:'Категории',accounts:'Счета',currency:'Валюта',addAccount:'Добавить счёт',addAcct:'Новый счёт',expense:'Расход',incomeBtn:'Доход',transfer:'Перевод',required:'Обязательно',noTx:'Операций пока нет'},
  uz:{finance:'Moliya',balance:'BALANS',spending:'XARAJATLAR',cashflow:'PUL OQIMI',income:'DAROMAD',topExpenses:'Eng ko\'p xarajat',lastRecords:'So\'nggi amallar',dashboard:'Bosh sahifa',statistics:'Statistika',category:'Kategoriya',account:'Hisob',note:'Izoh',save:'Saqlash',categories:'Kategoriyalar',accounts:'Hisoblar',currency:'Valyuta',addAccount:'Hisob qo\'shish',addAcct:'Yangi hisob',expense:'Xarajat',incomeBtn:'Daromad',transfer:'O\'tkazma',required:'Majburiy',noTx:'Amallar yo\'q'},
  de:{finance:'Finanzen',balance:'GUTHABEN',spending:'AUSGABEN',cashflow:'CASHFLOW',income:'EINNAHMEN',topExpenses:'Top Ausgaben',lastRecords:'Letzte Buchungen',dashboard:'Übersicht',statistics:'Statistik',category:'Kategorie',account:'Konto',note:'Notiz',save:'Speichern',categories:'Kategorien',accounts:'Konten',currency:'Währung',addAccount:'Konto hinzufügen',addAcct:'Neues Konto',expense:'Ausgabe',incomeBtn:'Einnahme',transfer:'Überweisung',required:'Erforderlich',noTx:'Keine Buchungen'},
  zh:{finance:'财务',balance:'余额',spending:'支出',cashflow:'现金流',income:'收入',topExpenses:'主要支出',lastRecords:'最近记录',dashboard:'概览',statistics:'统计',category:'类别',account:'账户',note:'备注',save:'保存',categories:'类别',accounts:'账户',currency:'货币',addAccount:'添加账户',addAcct:'新账户',expense:'支出',incomeBtn:'收入',transfer:'转账',required:'必填',noTx:'暂无交易'},
  ar:{finance:'المالية',balance:'الرصيد',spending:'الإنفاق',cashflow:'التدفق النقدي',income:'الدخل',topExpenses:'أعلى النفقات',lastRecords:'آخر السجلات',dashboard:'الرئيسية',statistics:'الإحصائيات',category:'الفئة',account:'الحساب',note:'ملاحظة',save:'حفظ',categories:'الفئات',accounts:'الحسابات',currency:'العملة',addAccount:'إضافة حساب',addAcct:'حساب جديد',expense:'مصروف',incomeBtn:'دخل',transfer:'تحويل',required:'مطلوب',noTx:'لا توجد معاملات'},
};
let lang=localStorage.getItem('nx-lang')||'ru';
function t(k){return (LANGS[lang]||LANGS.en)[k]||k;}
function applyLang(){
  document.getElementById('title-finance').textContent=t('finance');
  document.getElementById('t-balance').textContent=t('balance');
  document.getElementById('t-spending').textContent=t('spending');
  document.getElementById('t-cashflow').textContent=t('cashflow');
  document.getElementById('t-income').textContent=t('income');

// ── Currencies + exchange rates ───────────────────────────────────
const CURRENCIES=['UZS','USD','EUR','RUB','GBP','JPY','CNY','KZT','TRY','AED','SAR','KRW','INR','BTC','ETH'];
let curRates={};
let activeCur=localStorage.getItem('nx-cur')||'UZS';

async function fetchRates(){
  try{
    const r=await fetch('https://api.exchangerate-api.com/v4/latest/USD');
    const d=await r.json();
    curRates=d.rates||{};
    localStorage.setItem('nx-rates',JSON.stringify({ts:Date.now(),rates:curRates}));
  }catch(e){
    const saved=localStorage.getItem('nx-rates');
    if(saved){try{curRates=JSON.parse(saved).rates||{};}catch{}}
  }
}

function fmtMoney(val,cur){
  cur=cur||activeCur;
  const absVal=Math.abs(val);
  if(absVal>=1e9)return `${(val/1e9).toFixed(1)}B`;
  if(absVal>=1e6)return `${(val/1e6).toFixed(1)}M`;
  return `${cur} ${val.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}`;
}

function convertToCur(amountUzs){
  // Base stored in UZS, convert to active currency
  if(activeCur==='UZS')return amountUzs;
  const uzsRate=curRates['UZS']||12500;
  const tarRate=curRates[activeCur]||1;
  return (amountUzs/uzsRate)*tarRate;
}

// ── State ─────────────────────────────────────────────────────────
let recordType='expense';
let amountStr='0';
let selectedCat=null;
let selectedAcct='cash';
let periods=['today','week','month','year'];
let period='month';
let accounts=[];
let transactions=[];

// ── API ──────────────────────────────────────────────────────────
async function api(method,path,body){
  try{
    const sep=path.includes('?')?'&':'?';
    const url=method==='GET'?path+sep+'uid='+UID:path;
    const opts={method,headers:{'Content-Type':'application/json'}};
    if(body)opts.body=JSON.stringify({...body,uid:UID});
    const r=await fetch(url,opts);
    return r.json();
  }catch(e){return{ok:false,error:e.message};}
}

// ── Load data ────────────────────────────────────────────────────
async function loadAll(){
  const [txRes,acRes]=await Promise.all([
    api('GET','/api/finance?period='+period),
    api('GET','/api/accounts'),
  ]);
  transactions=(txRes.data||[]);
  accounts=(acRes.data||[]);
  renderDashboard();
  renderStats();
  renderAccountsBar();
}

function renderAccountsBar(){
  const c=document.getElementById('accounts-scroll');
  const addBtn=`<div class="acct-card add" onclick="openSheet('add-acct-sheet')">
    <span style="font-size:24px">＋</span>
    <span style="font-size:12px">${t('addAccount')}</span>
  </div>`;
  const cards=accounts.map(a=>`
    <div class="acct-card" onclick="selectedAcct='${a.id}';closeSheet('acct-sheet')">
      <div class="acct-icon dark"><span>${a.icon||'💳'}</span></div>
      <div class="acct-name">${a.name}</div>
      <div class="acct-bal">${fmtMoney(convertToCur(a.balance||0))}</div>
    </div>`).join('');
  c.innerHTML=cards+addBtn;
  // Also update acct-list-sheet
  const ls=document.getElementById('acct-list-sheet');
  if(ls)ls.innerHTML=accounts.map(a=>`
    <div class="drop-item${selectedAcct===a.id?' sel':''}" onclick="selectedAcct='${a.id}';document.getElementById('acct-selected').textContent='${a.name}';closeSheet('acct-sheet')">
      ${a.icon||'💳'} ${a.name} · ${fmtMoney(convertToCur(a.balance||0))}
    </div>`).join('');
}

function renderDashboard(){
  const exp=transactions.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const inc=transactions.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const bal=inc-exp;
  document.getElementById('bal-val').textContent=fmtMoney(convertToCur(bal));
  document.getElementById('bal-val').className='sum-val'+(bal>=0?' pos':' neg');
  document.getElementById('spend-val').textContent=fmtMoney(convertToCur(exp));
  document.getElementById('cf-val').textContent=(bal>=0?'+':'')+fmtMoney(convertToCur(bal));
  document.getElementById('cf-val').className='sum-val'+(bal>=0?' pos':' neg');
  document.getElementById('inc-val').textContent=fmtMoney(convertToCur(inc));

  // Top expenses by category
  const bycat={};
  transactions.filter(t=>t.type==='expense').forEach(t=>{
    bycat[t.category]=(bycat[t.category]||0)+t.amount;
  });
  const sorted=Object.entries(bycat).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxV=sorted[0]?.[1]||1;
  const topEl=document.getElementById('top-expenses');
  if(!sorted.length){
    topEl.innerHTML=`<div class="empty"><span class="empty-icon">💸</span>${t('noTx')}</div>`;
  }else{
    topEl.innerHTML=sorted.map(([cat,amt])=>{
      const c=catById(cat);
      return `<div class="exp-row">
        <div class="exp-top">
          <span class="exp-cat">${c.emoji} ${catName(c)}</span>
          <span class="exp-amt">−${fmtMoney(convertToCur(amt))}</span>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${(amt/maxV*100).toFixed(0)}%;background:${c.color}"></div></div>
      </div>`;
    }).join('');
  }

  // Last records
  const txEl=document.getElementById('tx-list');
  const recent=transactions.slice(0,20);
  if(!recent.length){
    txEl.innerHTML=`<div class="empty"><span class="empty-icon">📋</span>${t('noTx')}</div>`;
  }else{
    txEl.innerHTML=recent.map(tx=>{
      const c=catById(tx.category);
      const isExp=tx.type==='expense';
      const d=new Date(tx.created_at).toLocaleDateString(lang==='ru'?'ru-RU':lang==='uz'?'uz-UZ':'en-US',{day:'2-digit',month:'short'});
      return `<div class="tx-row">
        <div class="tx-icon" style="background:${c.color}20">${c.emoji}</div>
        <div class="tx-body">
          <div class="tx-name">${tx.note||catName(c)}</div>
          <div class="tx-date">${d}</div>
        </div>
        <div class="tx-amt ${isExp?'exp':'inc'}">${isExp?'−':'+'}${fmtMoney(convertToCur(tx.amount))}</div>
      </div>`;
    }).join('');
  }
}

function renderStats(){
  const exp=transactions.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const inc=transactions.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const stats=[
    {label:'BALANCE',val:inc-exp,cls:inc-exp>=0?'pos':'neg'},
    {label:'SPENDING',val:exp,cls:'neg'},
    {label:'CASH FLOW',val:inc-exp,cls:inc-exp>=0?'pos':'neg'},
    {label:'INCOME',val:inc,cls:'pos'},
  ];
  document.getElementById('stats-grid').innerHTML=stats.map(s=>`
    <div class="stat-card">
      <div class="stat-label">${s.label}</div>
      <div class="stat-val ${s.cls}">${fmtMoney(convertToCur(s.val))}</div>
    </div>`).join('');
}

// ── Period bar ───────────────────────────────────────────────────
function renderPeriodBar(){
  const labels={today:{en:'Today',ru:'Сегодня',uz:'Bugun',de:'Heute',zh:'今天',ar:'اليوم'},
                week:{en:'This week',ru:'Эта неделя',uz:'Bu hafta',de:'Diese Woche',zh:'本周',ar:'هذا الأسبوع'},
                month:{en:'This month',ru:'Этот месяц',uz:'Bu oy',de:'Dieser Monat',zh:'本月',ar:'هذا الشهر'},
                year:{en:'This year',ru:'Этот год',uz:'Bu yil',de:'Dieses Jahr',zh:'今年',ar:'هذا العام'}};
  document.getElementById('period-bar').innerHTML=periods.map(p=>`
    <button class="period-btn${p===period?' act':''}" onclick="setPeriod('${p}')">${(labels[p]||{})[lang]||p}</button>`).join('');
}

function setPeriod(p){period=p;renderPeriodBar();loadAll();}

// ── Sheets ───────────────────────────────────────────────────────
function openSheet(id){document.getElementById(id).classList.add('open');}
function closeSheet(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.overlay').forEach(el=>{
  el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');});
});

// ── Add record ───────────────────────────────────────────────────
function openAddRecord(){
  amountStr='0';
  selectedCat=null;
  document.getElementById('amount-num').textContent='0';
  const cs=document.getElementById('cat-selected');
  cs.textContent=t('required');cs.style.color='var(--red)';cs.dataset.required='1';
  document.getElementById('note-input').value='';
  openSheet('add-sheet');
}

function setType(tp){
  recordType=tp;
  ['exp','inc','tr'].forEach(s=>document.getElementById('seg-'+s).classList.remove('act'));
  document.getElementById('seg-'+(tp==='expense'?'exp':tp==='income'?'inc':'tr')).classList.add('act');
  renderCats();
}

function numpad(k){
  if(k==='del'){amountStr=amountStr.length>1?amountStr.slice(0,-1):'0';}
  else if(k==='.'){if(!amountStr.includes('.'))amountStr+='.';} 
  else{if(amountStr==='0')amountStr=k;else if(amountStr.length<12)amountStr+=k;}
  document.getElementById('amount-num').textContent=parseFloat(amountStr).toLocaleString('en-US')||amountStr;
}

function renderCats(){
  const expCats=CATS.filter(c=>!['salary','free','bonus'].includes(c.id));
  const incCats=CATS.filter(c=>['salary','free','bonus','other'].includes(c.id));
  const list=recordType==='income'?incCats:expCats;
  document.getElementById('cat-grid').innerHTML=list.map(c=>`
    <div class="cat-item" onclick="selectCat('${c.id}')">
      <div class="cat-circle${selectedCat===c.id?' sel':''}" style="background:${c.color}30">
        <span style="font-size:24px">${c.emoji}</span>
      </div>
      <span class="cat-name">${catName(c)}</span>
    </div>`).join('');
}

function selectCat(id){
  selectedCat=id;
  const c=catById(id);
  const el=document.getElementById('cat-selected');
  el.textContent=c.emoji+' '+catName(c);
  el.style.color='var(--fg2)';
  el.dataset.required='0';
  closeSheet('cat-sheet');
  renderCats();
}

async function saveRecord(){
  const amount=parseFloat(amountStr);
  if(!amount||amount<=0)return;
  await api('POST','/api/finance',{
    type:recordType,
    amount,
    category:selectedCat||'other',
    note:document.getElementById('note-input').value,
    account_id:selectedAcct,
    currency:activeCur,
  });
  closeSheet('add-sheet');
  loadAll();
}

// ── Currency sheet ───────────────────────────────────────────────
function renderCurSheet(){
  const rateStr=(cur)=>{
    if(!curRates[cur])return '';
    const uzsRate=curRates['UZS']||12500;
    const tarRate=curRates[cur]||1;
    const rate=(uzsRate/tarRate).toFixed(2);
    return `<span style="font-size:12px;color:var(--fg3);margin-left:6px">1 ${cur} = ${Number(rate).toLocaleString()} UZS</span>`;
  };
  document.getElementById('cur-list').innerHTML=CURRENCIES.map(c=>`
    <div class="drop-item${c===activeCur?' sel':''}" onclick="setCur('${c}')">
      ${c} ${rateStr(c)}
    </div>`).join('');
}

function setCur(c){
  activeCur=c;
  localStorage.setItem('nx-cur',c);
  document.getElementById('cur-label').textContent=c;
  document.getElementById('cur-picker-btn').textContent=c;
  renderCurSheet();
  closeSheet('cur-sheet');
  renderDashboard();
  renderStats();
  renderAccountsBar();
}

// ── Language sheet ───────────────────────────────────────────────
const LANG_NAMES={en:'English',ru:'Русский',uz:"O'zbek",de:'Deutsch',zh:'中文',ar:'العربية'};
function renderLangSheet(){
  document.getElementById('lang-list').innerHTML=Object.entries(LANG_NAMES).map(([k,v])=>`
    <div class="drop-item${k===lang?' sel':''}" onclick="setLang('${k}')">${v}</div>`).join('');
}

function setLang(l){
  lang=l;
  localStorage.setItem('nx-lang',l);
  applyLang();
  renderLangSheet();
  renderCats();
  renderPeriodBar();
  closeSheet('lang-sheet');
  renderDashboard();
}

// ── Account create ───────────────────────────────────────────────
async function createAccount(){
  const name=document.getElementById('acct-name-input').value.trim();
  const cur=document.getElementById('acct-cur-sel').value;
  if(!name)return;
  await api('POST','/api/accounts',{name,currency:cur,icon:'💳',balance:0});
  closeSheet('add-acct-sheet');
  loadAll();
}

// ── Account currency selector ─────────────────────────────────────
document.getElementById('acct-cur-sel').innerHTML=CURRENCIES.map(c=>`<option value="${c}">${c}</option>`).join('');

// ── Pages ─────────────────────────────────────────────────────────
function switchPage(name,btn){
  document.getElementById('page-dashboard').style.display=name==='dashboard'?'block':'none';
  document.getElementById('page-stats').style.display=name==='stats'?'block':'none';
  document.querySelectorAll('.bnav-item').forEach(b=>b.classList.remove('act'));
  if(btn)btn.classList.add('act');
}

// ── Init ─────────────────────────────────────────────────────────
async function init(){
  await fetchRates();
  applyLang();
  renderPeriodBar();
  renderCurSheet();
  renderLangSheet();
  renderCats();
  loadAll();
}
init();
</script>
