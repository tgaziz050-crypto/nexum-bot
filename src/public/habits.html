<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>NEXUM — Привычки</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,500;9..40,600&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>

:root{--font:'DM Sans',-apple-system,sans-serif;--mono:'DM Mono',monospace;--t:0.22s cubic-bezier(0.25,0.46,0.45,0.94);}
[data-theme="dark"]{--bg:#000;--s:#1c1c1e;--s2:#2c2c2e;--s3:#3a3a3c;--b:rgba(255,255,255,0.07);--t1:#fff;--t2:rgba(255,255,255,0.55);--t3:rgba(255,255,255,0.25);}
[data-theme="light"]{--bg:#f2f2f7;--s:#fff;--s2:#f2f2f7;--s3:#e5e5ea;--b:rgba(0,0,0,0.06);--t1:#000;--t2:rgba(0,0,0,0.5);--t3:rgba(0,0,0,0.22);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
::-webkit-scrollbar{display:none;}
body{font-family:var(--font);background:var(--bg);color:var(--t1);min-height:100vh;-webkit-font-smoothing:antialiased;padding-bottom:50px;}
.hdr{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:0.5px solid var(--b);padding:12px 18px 10px;display:flex;align-items:center;gap:10px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);}
.logo-box{width:34px;height:34px;background:var(--t1);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo-box img{width:22px;height:22px;object-fit:contain;}
[data-theme="light"] .logo-box img{filter:invert(1);}
.hdr-title{font-size:17px;font-weight:600;letter-spacing:-0.3px;flex:1;}
.icon-btn{width:30px;height:30px;background:var(--s2);border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;color:var(--t1);transition:var(--t);flex-shrink:0;border:none;}
.icon-btn:active{transform:scale(0.88);}
.icon-btn.act{background:var(--t1);color:var(--bg);}
.slabel{font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--t2);padding:16px 18px 8px;}
.nx-card{background:var(--s);border-radius:18px;margin:0 14px;overflow:hidden;border:0.5px solid var(--b);}
.nx-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:0.5px solid var(--b);}
.nx-row:last-child{border-bottom:none;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:100;opacity:0;pointer-events:none;transition:opacity 0.25s;display:flex;align-items:flex-end;}
.overlay.open{opacity:1;pointer-events:all;}
.sheet{background:var(--s);border-radius:24px 24px 0 0;padding:0 0 env(safe-area-inset-bottom,24px);width:100%;transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);max-height:88vh;overflow-y:auto;}
.overlay.open .sheet{transform:translateY(0);}
.handle{width:36px;height:4px;background:var(--s3);border-radius:2px;margin:12px auto 0;}
.sheet-title{font-size:17px;font-weight:600;padding:14px 18px 16px;letter-spacing:-0.3px;}
.ig{padding:0 18px;margin-bottom:14px;}
.il{font-size:13px;font-weight:500;color:var(--t2);margin-bottom:6px;}
.inp,.sel{width:100%;background:var(--s2);border:none;border-radius:12px;padding:13px 14px;font-family:var(--font);font-size:16px;color:var(--t1);outline:none;appearance:none;-webkit-appearance:none;}
.inp:focus{background:var(--s3);}
.inp::placeholder{color:var(--t3);}
.sbtn{width:calc(100% - 36px);margin:8px 18px 0;padding:15px;background:var(--t1);color:var(--bg);border:none;border-radius:14px;font-family:var(--font);font-size:16px;font-weight:600;cursor:pointer;transition:opacity var(--t);}
.sbtn:active{opacity:0.75;}
.cbtn{width:100%;padding:12px;background:none;border:none;color:var(--t2);font-family:var(--font);font-size:15px;cursor:pointer;}
.empty{text-align:center;padding:60px 20px;}
.empty-icon{font-size:44px;opacity:0.35;margin-bottom:10px;}
.empty p{font-size:15px;color:var(--t2);}
.spinner{text-align:center;padding:40px;color:var(--t3);}
.spin{display:inline-block;animation:spin 1s linear infinite;font-size:24px;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes up{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

.today-card{margin:12px 14px 0;background:var(--s);border-radius:18px;padding:16px;position:relative;overflow:hidden;border:0.5px solid var(--b);}
.today-card::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:radial-gradient(circle,rgba(255,159,10,.2),transparent 65%);pointer-events:none;}
.tb-lbl{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--t2);}
.prog-wrap{display:flex;align-items:center;gap:10px;margin-top:8px;}
.prog-track{flex:1;height:5px;background:var(--s2);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:#ff9f0a;border-radius:3px;transition:width .6s cubic-bezier(.34,1.56,.64,1);}
[data-theme="light"] .prog-fill{background:#ff9500;}
.prog-txt{font-family:var(--mono);font-size:13px;color:#ff9f0a;font-weight:500;}
[data-theme="light"] .prog-txt{color:#ff9500;}
.h-list{padding:10px 14px 30px;display:flex;flex-direction:column;gap:9px;}
.h-card{background:var(--s);border-radius:17px;padding:13px;display:flex;align-items:center;gap:12px;border:0.5px solid var(--b);transition:var(--t);}
.h-emoji-btn{width:50px;height:50px;border-radius:14px;background:var(--s2);border:1.5px solid var(--b);font-size:23px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:var(--t);}
.h-emoji-btn.done{background:rgba(255,159,10,.12);border-color:rgba(255,159,10,.4);transform:scale(1.05);}
[data-theme="light"] .h-emoji-btn.done{background:rgba(255,149,0,.1);}
.h-name{font-size:14px;font-weight:600;color:var(--t1);margin-bottom:2px;}
.h-streak{font-family:var(--mono);font-size:12px;color:#ff9f0a;}
[data-theme="light"] .h-streak{color:#ff9500;}
.h-week{display:flex;gap:3px;margin-top:6px;}
.wdot{width:22px;height:22px;border-radius:7px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--t3);font-weight:500;}
.wdot.done{background:rgba(255,159,10,.2);color:#ff9f0a;}
[data-theme="light"] .wdot.done{background:rgba(255,149,0,.13);color:#ff9500;}
.wdot.today{border:1.5px solid #ff9f0a;}
[data-theme="light"] .wdot.today{border-color:#ff9500;}
.h-best{font-size:10px;color:var(--t3);margin-top:3px;}
.emoji-grid{display:flex;flex-wrap:wrap;gap:7px;}
.eb{width:40px;height:40px;border-radius:11px;background:var(--s2);border:1.5px solid transparent;font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--t);}
.eb.sel{border-color:#ff9f0a;background:rgba(255,159,10,.1);}
</style>
</head>
<body>
<div class="hdr">
  <button class="icon-btn" onclick="history.back()">&#8249;</button>
  <div class="logo-box"><img class="nx-logo-img" alt="N"></div>
  <div class="hdr-title">Привычки</div>
  <button class="icon-btn theme-btn" onclick="toggleTheme()">🌙</button>
  <button class="icon-btn act" onclick="openSheet('modal')">＋</button>
</div>

<div class="today-card">
  <div class="tb-lbl">Сегодня</div>
  <div class="prog-wrap">
    <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="prog-txt" id="prog-txt">0/0</div>
  </div>
</div>
<div id="h-area"><div class="spinner"><span class="spin">◌</span></div></div>

<div class="overlay" id="modal" onclick="if(event.target===this)closeSheet('modal')">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-title">Новая привычка</div>
    <div class="ig"><div class="il">Название</div>
      <input class="inp" id="h-name" placeholder="Медитация, Спорт, Чтение..."></div>
    <div class="ig"><div class="il">Иконка</div>
      <div class="emoji-grid" id="e-grid"></div></div>
    <button class="sbtn" onclick="addHabit()">Добавить</button>
    <button class="cbtn" onclick="closeSheet('modal')">Отмена</button>
  </div>
</div>

<script>

const tg = window.Telegram?.WebApp;
if(tg){ tg.ready(); tg.expand(); }

// ─── UID: 3 уровня fallback ─────────────────────────────────────────────────
// 1. Telegram.WebApp.initDataUnsafe.user.id  (работает в Telegram)
// 2. URL параметр ?uid=  (передаётся из бота через ссылку)
// 3. localStorage (кэш предыдущих сессий)
function resolveUID() {
  // Уровень 1: Telegram WebApp API
  try {
    const u = tg?.initDataUnsafe?.user;
    if (u?.id && u.id > 0) {
      localStorage.setItem('nx_uid', String(u.id));
      return u.id;
    }
  } catch(e) {}

  // Уровень 2: URL параметр
  const urlUid = parseInt(new URLSearchParams(location.search).get('uid') || '0');
  if (urlUid > 0) {
    localStorage.setItem('nx_uid', String(urlUid));
    return urlUid;
  }

  // Уровень 3: Кэш
  const cached = parseInt(localStorage.getItem('nx_uid') || '0');
  if (cached > 0) return cached;

  return 0;
}

const UID = resolveUID();

// Предупреждение если UID не найден (только в dev)

// ─── Тема ─────────────────────────────────────────────────────────────────────
const html = document.documentElement;
let dark = localStorage.getItem('nx-theme') !== 'light';
function applyTheme() {
  html.setAttribute('data-theme', dark ? 'dark' : 'light');
  document.querySelectorAll('.theme-btn').forEach(b => b.textContent = dark ? '🌙' : '☀️');
  if (tg) {
    try { tg.setHeaderColor(dark ? '#000000' : '#f2f2f7'); } catch(e) {}
    try { tg.setBackgroundColor(dark ? '#000000' : '#f2f2f7'); } catch(e) {}
  }
}
function toggleTheme() {
  dark = !dark;
  localStorage.setItem('nx-theme', dark ? 'dark' : 'light');
  applyTheme();
}
applyTheme();

// ─── API helper ───────────────────────────────────────────────────────────────
async function api(method, path, body) {
  try {
    const sep = path.includes('?') ? '&' : '?';
    const url = method === 'GET' ? path + sep + 'uid=' + UID : path;
    const opts = { method, headers: {'Content-Type': 'application/json'} };
    if (body) opts.body = JSON.stringify({...body, uid: UID});
    const r = await fetch(url, opts);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  } catch(e) {
    console.error('[API]', method, path, e.message);
    return { ok: false, error: e.message };
  }
}

// ─── Sheet helpers ────────────────────────────────────────────────────────────
function openSheet(id) { document.getElementById(id).classList.add('open'); }
function closeSheet(id) { document.getElementById(id).classList.remove('open'); }

const EMOJIS = ['🎯','💪','📚','🧘','🏃','💧','🥗','😴','✍️','🎸','🎨','🧹','💊','🚿','☀️','🌙','🏋️','🧠','🎵','🌱'];
const WL = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
let allHabits = [], selEmoji = '🎯';

function getWeekDates() {
  const d = [], n = new Date();
  n.setDate(n.getDate() - 6);
  for (let i = 0; i < 7; i++) { d.push(n.toISOString().split('T')[0]); n.setDate(n.getDate()+1); }
  return d;
}

async function load() {
  if (!UID) {
    document.getElementById('h-area').innerHTML =
      '<div class="empty"><div class="empty-icon">🔒</div><p>Откройте через Telegram бота</p></div>';
    return;
  }
  const {ok, data} = await api('GET', '/api/habits');
  if (ok) { allHabits = data || []; render(); }
}

function render() {
  const today = new Date().toISOString().split('T')[0];
  const done = allHabits.filter(h => h.done_today).length;
  const pct = allHabits.length ? Math.round(done / allHabits.length * 100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-txt').textContent = done + '/' + allHabits.length;
  const el = document.getElementById('h-area');
  if (!allHabits.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🎯</div><p>Нет привычек.<br>Нажми ＋ чтобы добавить</p></div>';
    return;
  }
  const wd = getWeekDates();
  let html = '<div class="h-list">';
  allHabits.forEach((h, i) => {
    const logs = h.logs || [];
    const dots = wd.map(d => {
      const cls = 'wdot' + (logs.includes(d) ? ' done' : '') + (d === today ? ' today' : '');
      return `<div class="${cls}">${WL[new Date(d+'T12:00').getDay()][0]}</div>`;
    }).join('');
    html += `<div class="h-card" style="animation:up 0.3s ${i*0.05}s both">
      <div class="h-emoji-btn${h.done_today?' done':''}" onclick="toggle(${h.id})">${h.emoji||'🎯'}</div>
      <div style="flex:1;min-width:0">
        <div class="h-name">${h.name}</div>
        <div class="h-streak">🔥 ${h.streak||0} дн. подряд</div>
        <div class="h-week">${dots}</div>
        <div class="h-best">Рекорд: ${h.best_streak||0} дн.</div>
      </div>
    </div>`;
  });
  el.innerHTML = html + '</div>';
}

async function toggle(id) {
  const r = await api('POST', '/api/habits/' + id + '/toggle', {});
  if (r.ok) {
    if (tg) tg.HapticFeedback?.impactOccurred('medium');
    load();
  }
}

function renderEmojis() {
  document.getElementById('e-grid').innerHTML = EMOJIS.map(e =>
    `<button class="eb${e===selEmoji?' sel':''}" onclick="pickEmoji('${e}',this)">${e}</button>`
  ).join('');
}
function pickEmoji(e, el) {
  selEmoji = e;
  document.querySelectorAll('.eb').forEach(b => b.classList.remove('sel'));
  el.classList.add('sel');
}
document.getElementById('modal').querySelector('.sheet').addEventListener('transitionend', () => {
  if (document.getElementById('modal').classList.contains('open')) renderEmojis();
});

async function addHabit() {
  const name = document.getElementById('h-name').value.trim();
  if (!name) return;
  const r = await api('POST', '/api/habits', {name, emoji: selEmoji});
  if (r.ok) {
    closeSheet('modal');
    load();
    if (tg) tg.HapticFeedback?.notificationOccurred('success');
  }
}

// Auto-refresh on visibility
document.addEventListener('visibilitychange', () => { if (!document.hidden) load(); });
load();
</script>
