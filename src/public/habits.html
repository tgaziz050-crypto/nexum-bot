<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>NEXUM Habits</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--bg:#000;--bg2:#111;--bg3:#1c1c1e;--bg4:#2c2c2e;--fg:#fff;--fg2:rgba(255,255,255,0.55);--fg3:rgba(255,255,255,0.25);--sep:rgba(255,255,255,0.07);--green:#30d158;--r:16px;--font:-apple-system,'SF Pro Display',system-ui,sans-serif;}
html,body{height:100%;background:var(--bg);color:var(--fg);font-family:var(--font);-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{display:none;}
.hdr{padding:16px 20px 12px;display:flex;align-items:center;gap:10px;}
.nx{width:30px;height:30px;background:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;}
.nx svg{width:18px;height:18px;}
.hdr-title{font-size:18px;font-weight:700;flex:1;}
.streak-banner{margin:0 20px 16px;background:var(--bg3);border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;gap:12px;}
.streak-fire{font-size:32px;}
.streak-text{flex:1;}
.streak-num{font-size:22px;font-weight:700;}
.streak-label{font-size:13px;color:var(--fg2);}
.habits-list{padding:0 20px;display:flex;flex-direction:column;gap:10px;padding-bottom:100px;}
.habit-card{background:var(--bg3);border-radius:var(--r);padding:16px;}
.habit-top{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.habit-emoji{font-size:28px;width:48px;height:48px;border-radius:14px;background:var(--bg4);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.habit-info{flex:1;}
.habit-name{font-size:16px;font-weight:600;}
.habit-streak{font-size:13px;color:var(--fg2);margin-top:3px;}
.check-btn{width:40px;height:40px;border-radius:50%;border:2px solid var(--fg3);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;transition:all 0.2s;}
.check-btn.done{background:var(--green);border-color:var(--green);}
.check-btn.done::after{content:'✓';color:#000;font-size:18px;font-weight:800;}
.week-dots{display:flex;gap:6px;}
.dot{width:28px;height:28px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--fg3);font-weight:600;flex:1;}
.dot.done-dot{background:var(--green)20;color:var(--green);}
.dot.today-dot{border:1.5px solid var(--fg3);}
.fab{position:fixed;bottom:30px;right:20px;width:52px;height:52px;background:#fff;border-radius:50%;border:none;font-size:24px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,0.5);cursor:pointer;z-index:100;}
.empty{text-align:center;padding:80px 20px;color:var(--fg2);}
.empty-icon{font-size:52px;opacity:0.3;display:block;margin-bottom:16px;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.overlay.open{opacity:1;pointer-events:all;}
.sheet{background:var(--bg2);border-radius:24px 24px 0 0;width:100%;padding:0 0 env(safe-area-inset-bottom,24px);transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);}
.overlay.open .sheet{transform:translateY(0);}
.sheet-handle{width:36px;height:4px;background:var(--bg4);border-radius:2px;margin:12px auto 0;}
.sheet-title{font-size:18px;font-weight:700;padding:12px 20px 16px;}
.emoji-picker{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;padding:0 20px 16px;}
.emoji-btn{font-size:24px;padding:8px;border:none;background:none;cursor:pointer;border-radius:10px;text-align:center;}
.emoji-btn.sel{background:var(--bg3);}
.field{padding:0 20px 16px;}
.field input{width:100%;background:var(--bg3);border:none;border-radius:12px;padding:14px;color:#fff;font-family:var(--font);font-size:16px;outline:none;}
.save-btn{width:calc(100%-40px);margin:0 20px 0;padding:15px;background:#fff;color:#000;border:none;border-radius:14px;font-family:var(--font);font-size:16px;font-weight:700;cursor:pointer;}
</style>
</head>
<body>
<div class="hdr">
  <div class="nx"><svg viewBox="0 0 22 22" fill="none"><path d="M4 18L9 4L11.5 10L15 4L18 18" stroke="#000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
  <span class="hdr-title" id="t-title">Привычки</span>
</div>
<div class="streak-banner">
  <div class="streak-fire">🔥</div>
  <div class="streak-text">
    <div class="streak-num" id="total-streak">0</div>
    <div class="streak-label" id="t-streak-label">Максимальный стрик</div>
  </div>
</div>
<div class="habits-list" id="habits-list"></div>
<button class="fab" onclick="openAdd()">＋</button>

<div class="overlay" id="add-overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="t-new-habit">Новая привычка</div>
    <div class="emoji-picker" id="emoji-picker"></div>
    <div class="field"><input id="habit-name" placeholder="Название привычки..."></div>
    <div class="field"><button class="save-btn" id="t-save" onclick="saveHabit()">Создать</button></div>
  </div>
</div>

<script>
const tg=window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();}
function getUID(){try{const u=tg?.initDataUnsafe?.user?.id;if(u)return u;}catch(e){}const p=new URLSearchParams(location.search);if(p.get('uid'))return parseInt(p.get('uid'));return 0;}
const UID=getUID();

const EMOJIS=['🎯','💪','📚','🏃','🧘','💧','🥗','😴','✍️','🎸','🧹','💊','🚿','🧠','🌿','☕','🐶','🚴','🎨','🏊'];
const I18N={
  ru:{title:'Привычки',streakLabel:'Максимальный стрик',newHabit:'Новая привычка',save:'Создать',empty:'Привычек пока нет',dayDone:'выполнено сегодня',streak:'стрик'},
  en:{title:'Habits',streakLabel:'Best streak',newHabit:'New habit',save:'Create',empty:'No habits yet',dayDone:'done today',streak:'streak'},
  uz:{title:'Odatlar',streakLabel:'Eng yaxshi seriya',newHabit:'Yangi odat',save:'Yaratish',empty:'Hali odat yo\'q',dayDone:'bugun bajarildi',streak:'seriya'},
  de:{title:'Gewohnheiten',streakLabel:'Beste Serie',newHabit:'Neue Gewohnheit',save:'Erstellen',empty:'Noch keine Gewohnheiten',dayDone:'heute erledigt',streak:'Serie'},
  zh:{title:'习惯',streakLabel:'最佳连续',newHabit:'新建习惯',save:'创建',empty:'暂无习惯',dayDone:'今天完成',streak:'连续'},
  ar:{title:'العادات',streakLabel:'أفضل سلسلة',newHabit:'عادة جديدة',save:'إنشاء',empty:'لا توجد عادات',dayDone:'تم اليوم',streak:'سلسلة'},
};
let lang=localStorage.getItem('nx-lang')||'ru';
function t(k){return (I18N[lang]||I18N.en)[k]||k;}

let habits=[];
let selectedEmoji='🎯';

async function api(method,path,body){
  try{const url=method==='GET'?path+(path.includes('?')?'&':'?')+'uid='+UID:path;const opts={method,headers:{'Content-Type':'application/json'}};if(body)opts.body=JSON.stringify({...body,uid:UID});return (await fetch(url,opts)).json();}catch(e){return{ok:false};}
}

function applyLang(){
  document.getElementById('t-title').textContent=t('title');
  document.getElementById('t-streak-label').textContent=t('streakLabel');
  document.getElementById('t-new-habit').textContent=t('newHabit');
  document.getElementById('t-save').textContent=t('save');
}
applyLang();

async function loadHabits(){
  const r=await api('GET','/api/habits');
  habits=r.data||[];
  const best=habits.reduce((m,h)=>Math.max(m,h.best_streak||0),0);
  document.getElementById('total-streak').textContent=best;
  renderHabits();
}

function renderHabits(){
  const el=document.getElementById('habits-list');
  if(!habits.length){el.innerHTML=`<div class="empty"><span class="empty-icon">🎯</span><span>${t('empty')}</span></div>`;return;}
  const today=new Date();
  const weekDays=Array.from({length:7},(_,i)=>{const d=new Date(today);d.setDate(d.getDate()-6+i);return d.toISOString().split('T')[0];});
  const todayStr=today.toISOString().split('T')[0];
  const dayLabels=['Mo','Tu','We','Th','Fr','Sa','Su'];
  el.innerHTML=habits.map(h=>{
    const dotsHtml=weekDays.map((d,i)=>{
      const done=(h.logs||[]).includes(d);
      const isToday=d===todayStr;
      return `<div class="dot${done?' done-dot':''}${isToday?' today-dot':''}">${dayLabels[i]}</div>`;
    }).join('');
    return `<div class="habit-card">
      <div class="habit-top">
        <div class="habit-emoji">${h.emoji||'🎯'}</div>
        <div class="habit-info">
          <div class="habit-name">${h.name}</div>
          <div class="habit-streak">🔥 ${h.streak||0} ${t('streak')}</div>
        </div>
        <button class="check-btn${h.done_today?' done':''}" onclick="toggle(${h.id})"></button>
      </div>
      <div class="week-dots">${dotsHtml}</div>
    </div>`;
  }).join('');
}

async function toggle(id){
  await api('POST',`/api/habits/${id}/toggle`,{});
  loadHabits();
}

function openAdd(){
  selectedEmoji='🎯';
  document.getElementById('habit-name').value='';
  renderEmojiPicker();
  document.getElementById('add-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('habit-name').focus(),400);
}

function renderEmojiPicker(){
  document.getElementById('emoji-picker').innerHTML=EMOJIS.map(e=>`<button class="emoji-btn${e===selectedEmoji?' sel':''}" onclick="selectEmoji('${e}')">${e}</button>`).join('');
}

function selectEmoji(e){selectedEmoji=e;renderEmojiPicker();}

async function saveHabit(){
  const name=document.getElementById('habit-name').value.trim();
  if(!name)return;
  await api('POST','/api/habits',{name,emoji:selectedEmoji});
  document.getElementById('add-overlay').classList.remove('open');
  loadHabits();
}

document.getElementById('add-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('add-overlay'))document.getElementById('add-overlay').classList.remove('open');});

loadHabits();
</script>
</body>
</html>
