<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20viewBox%3D%270%200%2032%2032%27%3E%3Crect%20width%3D%2732%27%20height%3D%2732%27%20rx%3D%277%27%20fill%3D%27black%27/%3E%3Cpath%20d%3D%27M6%2027L6%205C6%205%207%204%208%204L11%204C12%204%2013%205%2013%205L13%2017L19%205C20%204%2021%204%2022%204L24%204C25%204%2026%205%2026%205L26%2027C26%2027%2025%2028%2024%2028L21%2028C20%2028%2019%2027%2019%2027L19%2015L13%2027C12%2028%2011%2028%2010%2028L8%2028C7%2028%206%2027%206%2027Z%27%20fill%3D%27white%27/%3E%3C/svg%3E">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>NEXUM</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--bg:#000;--bg2:#111;--bg3:#1c1c1e;--bg4:#2c2c2e;--fg:#fff;--fg2:rgba(255,255,255,0.55);--fg3:rgba(255,255,255,0.25);--sep:rgba(255,255,255,0.07);--r:18px;--font:-apple-system,'SF Pro Display',system-ui,sans-serif;}
html,body{height:100%;background:var(--bg);color:var(--fg);font-family:var(--font);-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{display:none;}
.hdr{padding:20px 20px 8px;display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:center;gap:10px;}
.nx{width:36px;height:36px;background:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#000;}
.nx svg{width:22px;height:22px;}
.brand{font-size:20px;font-weight:700;letter-spacing:-0.5px;}
.greeting{font-size:13px;color:var(--fg2);padding:0 20px 20px;}
.sec-label{font-size:12px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--fg3);padding:0 20px 10px;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 20px 20px;}
.app-card{background:var(--bg3);border-radius:var(--r);padding:20px 16px;cursor:pointer;position:relative;overflow:hidden;min-height:120px;display:flex;flex-direction:column;justify-content:flex-end;transition:transform 0.15s;}
.app-card:active{transform:scale(0.97);}
.card-glow{position:absolute;top:-30px;right:-20px;width:100px;height:100px;border-radius:50%;opacity:0.15;filter:blur(20px);}
.card-icon{font-size:32px;margin-bottom:10px;}
.card-title{font-size:16px;font-weight:700;letter-spacing:-0.3px;}
.card-sub{font-size:12px;color:var(--fg2);margin-top:3px;}
.quick-list{margin:0 20px 20px;background:var(--bg3);border-radius:var(--r);overflow:hidden;}
.quick-row{display:flex;align-items:center;padding:14px 16px;border-bottom:0.5px solid var(--sep);cursor:pointer;}
.quick-row:last-child{border:none;}
.quick-row:active{background:var(--bg4);}
.quick-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-right:12px;flex-shrink:0;}
.quick-body{flex:1;}
.quick-title{font-size:14px;font-weight:500;}
.quick-sub{font-size:12px;color:var(--fg2);margin-top:2px;}
.quick-arr{color:var(--fg3);font-size:18px;}
.lang-bar{display:flex;gap:8px;padding:0 20px 20px;overflow-x:auto;}
.lang-btn{padding:6px 14px;border-radius:20px;border:none;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;background:var(--bg3);color:var(--fg2);white-space:nowrap;}
.lang-btn.act{background:#fff;color:#000;}
.pb{height:40px;}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo">
    <div class="nx">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M11 88 L11 16 C11 13 13 10 16 10 L30 10 C33 10 35 12 35 15 L35 50 L65 15 C67 12 69 10 72 10 L84 10 C87 10 89 12 89 15 L89 85 C89 88 87 90 84 90 L70 90 C67 90 65 88 65 85 L65 50 L35 85 C33 88 31 90 28 90 L16 90 C13 90 11 88 11 88 Z" fill="currentColor"/></svg>
    </div>
    <span class="brand">NEXUM</span>
  </div>
  <div style="font-size:13px;color:var(--fg2)" id="time-label"></div>
</div>
<div class="greeting" id="greeting-text">Привет!</div>

<div class="lang-bar" id="lang-bar"></div>

<div class="sec-label" id="sec-apps">ПРИЛОЖЕНИЯ</div>
<div class="grid">
  <div class="app-card" onclick="go('/finance')">
    <div class="card-glow" style="background:#30d158"></div>
    <div class="card-icon">💰</div>
    <div class="card-title" id="t-finance">Финансы</div>
    <div class="card-sub" id="t-finance-sub">Расходы и доходы</div>
  </div>
  <div class="app-card" onclick="go('/notes')">
    <div class="card-glow" style="background:#0a84ff"></div>
    <div class="card-icon">📝</div>
    <div class="card-title" id="t-notes">Заметки</div>
    <div class="card-sub" id="t-notes-sub">Записи и идеи</div>
  </div>
  <div class="app-card" onclick="go('/tasks')">
    <div class="card-glow" style="background:#ffd60a"></div>
    <div class="card-icon">✅</div>
    <div class="card-title" id="t-tasks">Задачи</div>
    <div class="card-sub" id="t-tasks-sub">Проекты и дела</div>
  </div>
  <div class="app-card" onclick="go('/habits')">
    <div class="card-glow" style="background:#ff453a"></div>
    <div class="card-icon">🎯</div>
    <div class="card-title" id="t-habits">Привычки</div>
    <div class="card-sub" id="t-habits-sub">Стрики и прогресс</div>
  </div>
</div>

<div class="sec-label" id="sec-quick">БЫСТРЫЕ ДЕЙСТВИЯ</div>
<div class="quick-list">
  <div class="quick-row" onclick="go('/notes?new=1')">
    <div class="quick-icon" style="background:#0a84ff20">📝</div>
    <div class="quick-body">
      <div class="quick-title" id="qa-note">Новая заметка</div>
      <div class="quick-sub" id="qa-note-sub">Быстро записать идею</div>
    </div>
    <div class="quick-arr">›</div>
  </div>
  <div class="quick-row" onclick="go('/tasks?new=1')">
    <div class="quick-icon" style="background:#ffd60a20">✅</div>
    <div class="quick-body">
      <div class="quick-title" id="qa-task">Новая задача</div>
      <div class="quick-sub" id="qa-task-sub">Добавить в список</div>
    </div>
    <div class="quick-arr">›</div>
  </div>
  <div class="quick-row" onclick="go('/finance?new=1')">
    <div class="quick-icon" style="background:#30d15820">💸</div>
    <div class="quick-body">
      <div class="quick-title" id="qa-expense">Записать расход</div>
      <div class="quick-sub" id="qa-expense-sub">Добавить транзакцию</div>
    </div>
    <div class="quick-arr">›</div>
  </div>
</div>
<div class="pb"></div>

<script>
const tg=window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();}

const WEBAPP_URL=location.origin;
function go(path){
  const uid=getUID();
  location.href=WEBAPP_URL+path+(path.includes('?')?'&':'?')+'uid='+uid;
}
function getUID(){try{const u=tg?.initDataUnsafe?.user?.id;if(u)return u;}catch(e){}const p=new URLSearchParams(location.search);if(p.get('uid'))return parseInt(p.get('uid'));return 0;}

// Time
function updateTime(){
  const now=new Date();
  const h=now.getHours();
  let label='';
  if(h>=5&&h<12)label='🌅';
  else if(h>=12&&h<17)label='☀️';
  else if(h>=17&&h<21)label='🌆';
  else label='🌙';
  document.getElementById('time-label').textContent=label+' '+now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}
updateTime();setInterval(updateTime,30000);

// i18n
const LANGS={
  ru:{apps:'ПРИЛОЖЕНИЯ',quick:'БЫСТРЫЕ ДЕЙСТВИЯ',finance:'Финансы',finSub:'Расходы и доходы',notes:'Заметки',notesSub:'Записи и идеи',tasks:'Задачи',tasksSub:'Проекты и дела',habits:'Привычки',habitsSub:'Стрики и прогресс',newNote:'Новая заметка',newNoteSub:'Быстро записать идею',newTask:'Новая задача',newTaskSub:'Добавить в список',newExp:'Записать расход',newExpSub:'Добавить транзакцию',greeting:'Привет'},
  en:{apps:'APPS',quick:'QUICK ACTIONS',finance:'Finance',finSub:'Expenses & income',notes:'Notes',notesSub:'Ideas & memos',tasks:'Tasks',tasksSub:'Projects & todos',habits:'Habits',habitsSub:'Streaks & progress',newNote:'New note',newNoteSub:'Quickly capture an idea',newTask:'New task',newTaskSub:'Add to list',newExp:'Add expense',newExpSub:'Record a transaction',greeting:'Hello'},
  uz:{apps:'ILOVALAR',quick:'TEZKOR AMALLAR',finance:'Moliya',finSub:'Xarajat va daromad',notes:'Eslatmalar',notesSub:'Yozuvlar va g\'oyalar',tasks:'Vazifalar',tasksSub:'Loyihalar',habits:'Odatlar',habitsSub:'Seriyalar',newNote:'Yangi eslatma',newNoteSub:'G\'oyani yozib qo\'y',newTask:'Yangi vazifa',newTaskSub:"Ro'yxatga qo'shish",newExp:'Xarajat qo\'sh',newExpSub:'Tranzaksiya yozish',greeting:'Salom'},
  de:{apps:'APPS',quick:'SCHNELLAKTIONEN',finance:'Finanzen',finSub:'Ausgaben & Einnahmen',notes:'Notizen',notesSub:'Ideen & Memos',tasks:'Aufgaben',tasksSub:'Projekte & Todos',habits:'Gewohnheiten',habitsSub:'Serien & Fortschritt',newNote:'Neue Notiz',newNoteSub:'Idee schnell erfassen',newTask:'Neue Aufgabe',newTaskSub:'Zur Liste hinzufügen',newExp:'Ausgabe eintragen',newExpSub:'Transaktion erfassen',greeting:'Hallo'},
  zh:{apps:'应用',quick:'快捷操作',finance:'财务',finSub:'收支记录',notes:'笔记',notesSub:'想法与备忘',tasks:'任务',tasksSub:'项目与待办',habits:'习惯',habitsSub:'连续记录',newNote:'新建笔记',newNoteSub:'快速记录想法',newTask:'新建任务',newTaskSub:'添加到列表',newExp:'记录支出',newExpSub:'添加交易',greeting:'你好'},
  ar:{apps:'التطبيقات',quick:'إجراءات سريعة',finance:'المالية',finSub:'المصروفات والدخل',notes:'الملاحظات',notesSub:'الأفكار والمذكرات',tasks:'المهام',tasksSub:'المشاريع والقوائم',habits:'العادات',habitsSub:'السلاسل والتقدم',newNote:'ملاحظة جديدة',newNoteSub:'التقاط فكرة سريعاً',newTask:'مهمة جديدة',newTaskSub:'أضف إلى القائمة',newExp:'تسجيل مصروف',newExpSub:'إضافة معاملة',greeting:'مرحبا'},
};
const LANG_NAMES={ru:'Русский',en:'English',uz:"O'zbek",de:'Deutsch',zh:'中文',ar:'العربية'};
let lang=localStorage.getItem('nx-lang')||'ru';

function applyLang(){
  const L=LANGS[lang]||LANGS.en;
  const user=tg?.initDataUnsafe?.user;
  const name=user?.first_name||'';
  document.getElementById('greeting-text').textContent=L.greeting+(name?' '+name:'')+'!';
  document.getElementById('sec-apps').textContent=L.apps;
  document.getElementById('sec-quick').textContent=L.quick;
  document.getElementById('t-finance').textContent=L.finance;
  document.getElementById('t-finance-sub').textContent=L.finSub;
  document.getElementById('t-notes').textContent=L.notes;
  document.getElementById('t-notes-sub').textContent=L.notesSub;
  document.getElementById('t-tasks').textContent=L.tasks;
  document.getElementById('t-tasks-sub').textContent=L.tasksSub;
  document.getElementById('t-habits').textContent=L.habits;
  document.getElementById('t-habits-sub').textContent=L.habitsSub;
  document.getElementById('qa-note').textContent=L.newNote;
  document.getElementById('qa-note-sub').textContent=L.newNoteSub;
  document.getElementById('qa-task').textContent=L.newTask;
  document.getElementById('qa-task-sub').textContent=L.newTaskSub;
  document.getElementById('qa-expense').textContent=L.newExp;
  document.getElementById('qa-expense-sub').textContent=L.newExpSub;
  renderLangBar();
}

function renderLangBar(){
  document.getElementById('lang-bar').innerHTML=Object.entries(LANG_NAMES).map(([k,v])=>
    `<button class="lang-btn${k===lang?' act':''}" onclick="setLang('${k}')">${v}</button>`).join('');
}

function setLang(l){lang=l;localStorage.setItem('nx-lang',l);applyLang();}

applyLang();
</script>
</body>
</html>
