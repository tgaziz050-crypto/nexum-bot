<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>NEXUM — Заметки</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26;
    --border: rgba(255,255,255,0.07); --accent: #f76eb2;
    --text: #f0f0f8; --muted: #6b6b80;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 16px; display: flex; align-items: center; gap: 12px;
  }
  .back-btn { background: none; border: none; color: var(--accent); font-size: 20px; cursor: pointer; }
  .header h1 { font-size: 18px; font-weight: 700; flex: 1; }
  .add-btn {
    background: var(--accent); border: none; color: #fff;
    width: 36px; height: 36px; border-radius: 10px;
    font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  }

  .search-bar {
    margin: 12px 16px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 10px 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .search-bar input {
    flex: 1; background: none; border: none; color: var(--text);
    font-family: 'Syne'; font-size: 14px; outline: none;
  }
  .search-bar input::placeholder { color: var(--muted); }

  .notes-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; padding: 0 16px 40px;
  }
  .note-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 14px;
    cursor: pointer; transition: all 0.15s;
    position: relative; overflow: hidden;
    min-height: 100px;
  }
  .note-card:active { transform: scale(0.97); }
  .note-card.pinned { border-color: rgba(247,110,178,0.4); }
  .note-card.pinned::before { content: '📌'; position: absolute; top: 8px; right: 8px; font-size: 12px; }
  .note-title { font-size: 13px; font-weight: 700; margin-bottom: 6px; word-break: break-word; }
  .note-preview { font-size: 12px; color: var(--muted); line-height: 1.4; word-break: break-word; }
  .note-date { font-size: 10px; color: var(--muted); margin-top: 8px; }

  .colors { display: flex; gap: 4px; flex-wrap: wrap; }
  .color-dot {
    width: 20px; height: 20px; border-radius: 50%; cursor: pointer;
    border: 2px solid transparent; transition: all 0.1s;
  }
  .color-dot.active { border-color: #fff; transform: scale(1.15); }

  /* Editor modal */
  .editor-overlay {
    position: fixed; inset: 0; background: var(--bg);
    z-index: 100; display: flex; flex-direction: column;
    transform: translateY(100%); transition: transform 0.3s ease;
  }
  .editor-overlay.open { transform: translateY(0); }
  .editor-header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 16px; display: flex; align-items: center; gap: 12px;
  }
  .editor-actions { display: flex; gap: 8px; margin-left: auto; }
  .editor-action-btn {
    background: none; border: none; color: var(--muted);
    font-size: 20px; cursor: pointer; padding: 4px;
  }
  .editor-action-btn.danger { color: #f87171; }
  .editor-action-btn.save { color: var(--accent); }
  .editor-title-input {
    background: none; border: none; width: 100%;
    font-family: 'Syne'; font-size: 20px; font-weight: 700;
    color: var(--text); outline: none; padding: 16px 16px 8px;
  }
  .editor-title-input::placeholder { color: var(--muted); }
  .editor-body {
    flex: 1; padding: 0 16px 16px;
  }
  .editor-textarea {
    width: 100%; height: 100%; background: none; border: none;
    font-family: 'Syne'; font-size: 15px; color: var(--text);
    outline: none; resize: none; line-height: 1.6;
  }
  .editor-textarea::placeholder { color: var(--muted); }

  .empty { text-align: center; padding: 60px 20px; color: var(--muted); grid-column: span 2; }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="header">
  <button class="back-btn" onclick="history.back()">‹</button>
  <h1>📝 Заметки</h1>
  <button class="add-btn" onclick="openEditor()">+</button>
</div>

<div class="search-bar">
  <span style="color:var(--muted)">🔍</span>
  <input type="text" id="search-input" placeholder="Поиск..." oninput="renderNotes()">
</div>

<div class="notes-grid" id="notes-list"></div>

<!-- Editor -->
<div class="editor-overlay" id="editor">
  <div class="editor-header">
    <button class="back-btn" onclick="closeEditor()">‹</button>
    <span style="font-size:14px;color:var(--muted)" id="editor-status">Новая заметка</span>
    <div class="editor-actions">
      <button class="editor-action-btn" onclick="togglePin()" id="pin-btn">📌</button>
      <button class="editor-action-btn danger" onclick="deleteNote()" id="delete-btn" style="display:none">🗑</button>
      <button class="editor-action-btn save" onclick="saveNote()">✓</button>
    </div>
  </div>
  <input class="editor-title-input" id="editor-title" type="text" placeholder="Заголовок...">
  <div class="editor-body">
    <textarea class="editor-textarea" id="editor-content" placeholder="Начни писать..."></textarea>
  </div>
</div>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); tg.setHeaderColor('#0a0a0f'); tg.setBackgroundColor('#0a0a0f'); }

  let notes = JSON.parse(localStorage.getItem('nx_notes') || '[]');
  let currentId = null;
  let isPinned = false;

  function save() { localStorage.setItem('nx_notes', JSON.stringify(notes)); }

  function renderNotes() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const filtered = notes.filter(n =>
      !q || n.title?.toLowerCase().includes(q) || n.content?.toLowerCase().includes(q)
    ).sort((a,b) => (b.pinned?1:0) - (a.pinned?1:0) || new Date(b.updatedAt) - new Date(a.updatedAt));

    const list = document.getElementById('notes-list');
    if (!filtered.length) {
      list.innerHTML = '<div class="empty"><div class="empty-icon">📝</div><p>Заметок нет.<br>Нажми + чтобы добавить</p></div>';
      return;
    }
    list.innerHTML = filtered.map(n => `
      <div class="note-card${n.pinned?' pinned':''}" onclick="openEditor('${n.id}')">
        ${n.title ? `<div class="note-title">${escHtml(n.title)}</div>` : ''}
        <div class="note-preview">${escHtml(n.content?.substring(0, 80) || '')}</div>
        <div class="note-date">${new Date(n.updatedAt).toLocaleDateString('ru-RU')}</div>
      </div>
    `).join('');
  }

  function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function openEditor(id) {
    currentId = id || null;
    const note = id ? notes.find(n => n.id === id) : null;
    document.getElementById('editor-title').value = note?.title || '';
    document.getElementById('editor-content').value = note?.content || '';
    document.getElementById('editor-status').textContent = note ? 'Редактировать' : 'Новая заметка';
    document.getElementById('delete-btn').style.display = note ? '' : 'none';
    isPinned = note?.pinned || false;
    document.getElementById('pin-btn').style.opacity = isPinned ? '1' : '0.4';
    document.getElementById('editor').classList.add('open');
    setTimeout(() => {
      const el = note?.title ? document.getElementById('editor-content') : document.getElementById('editor-title');
      el.focus();
    }, 300);
  }

  function closeEditor() {
    document.getElementById('editor').classList.remove('open');
    renderNotes();
  }

  function saveNote() {
    const title = document.getElementById('editor-title').value.trim();
    const content = document.getElementById('editor-content').value.trim();
    if (!title && !content) { closeEditor(); return; }

    if (currentId) {
      const idx = notes.findIndex(n => n.id === currentId);
      if (idx >= 0) { notes[idx] = { ...notes[idx], title, content, pinned: isPinned, updatedAt: new Date().toISOString() }; }
    } else {
      notes.push({ id: Date.now().toString(), title, content, pinned: isPinned, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() });
    }
    save();
    if (tg) tg.HapticFeedback?.notificationOccurred('success');
    closeEditor();
  }

  function deleteNote() {
    if (!currentId) return;
    if (!confirm('Удалить заметку?')) return;
    notes = notes.filter(n => n.id !== currentId);
    save();
    closeEditor();
  }

  function togglePin() {
    isPinned = !isPinned;
    document.getElementById('pin-btn').style.opacity = isPinned ? '1' : '0.4';
  }

  renderNotes();
</script>
</body>
</html>
