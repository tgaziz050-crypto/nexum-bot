<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20viewBox%3D%270%200%2032%2032%27%3E%3Crect%20width%3D%2732%27%20height%3D%2732%27%20rx%3D%277%27%20fill%3D%27black%27/%3E%3Cpath%20d%3D%27M6%2027L6%205C6%205%207%204%208%204L11%204C12%204%2013%205%2013%205L13%2017L19%205C20%204%2021%204%2022%204L24%204C25%204%2026%205%2026%205L26%2027C26%2027%2025%2028%2024%2028L21%2028C20%2028%2019%2027%2019%2027L19%2015L13%2027C12%2028%2011%2028%2010%2028L8%2028C7%2028%206%2027%206%2027Z%27%20fill%3D%27white%27/%3E%3C/svg%3E">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>NEXUM Notes</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--bg:#000;--bg2:#111;--bg3:#1c1c1e;--bg4:#2c2c2e;--fg:#fff;--fg2:rgba(255,255,255,0.55);--fg3:rgba(255,255,255,0.25);--sep:rgba(255,255,255,0.07);--blue:#0a84ff;--r:16px;--font:-apple-system,'SF Pro Display',system-ui,sans-serif;}
html,body{height:100%;background:var(--bg);color:var(--fg);font-family:var(--font);-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{display:none;}
.hdr{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;}
.nx{width:30px;height:30px;background:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-right:10px;}
.nx svg{width:20px;height:20px;}
.hdr-left{display:flex;align-items:center;}
.hdr-title{font-size:18px;font-weight:700;letter-spacing:-0.5px;}
.fab{position:fixed;bottom:30px;right:20px;width:52px;height:52px;background:#fff;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,0.5);cursor:pointer;z-index:100;font-size:24px;}
.search-bar{margin:0 20px 12px;background:var(--bg3);border-radius:12px;display:flex;align-items:center;padding:10px 14px;gap:10px;}
.search-bar input{flex:1;background:none;border:none;color:var(--fg);font-family:var(--font);font-size:15px;outline:none;}
.search-bar input::placeholder{color:var(--fg3);}
.notes-list{padding:0 20px;display:flex;flex-direction:column;gap:10px;padding-bottom:100px;}
.note-card{background:var(--bg3);border-radius:var(--r);padding:16px;cursor:pointer;position:relative;}
.note-card:active{background:var(--bg4);}
.note-pin{position:absolute;top:12px;right:12px;font-size:14px;}
.note-title{font-size:16px;font-weight:600;margin-bottom:6px;padding-right:24px;}
.note-body{font-size:14px;color:var(--fg2);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.note-date{font-size:11px;color:var(--fg3);margin-top:8px;}
.empty{text-align:center;padding:80px 20px;color:var(--fg2);}
.empty-icon{font-size:52px;opacity:0.3;display:block;margin-bottom:16px;}

/* Sheet */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.overlay.open{opacity:1;pointer-events:all;}
.sheet{background:var(--bg2);border-radius:24px 24px 0 0;width:100%;height:85vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);}
.overlay.open .sheet{transform:translateY(0);}
.sheet-handle{width:36px;height:4px;background:var(--bg4);border-radius:2px;margin:12px auto;flex-shrink:0;}
.editor-toolbar{display:flex;align-items:center;padding:0 16px 12px;gap:8px;flex-shrink:0;border-bottom:0.5px solid var(--sep);}
.editor-toolbar button{background:none;border:none;color:var(--fg2);font-size:14px;padding:6px 10px;cursor:pointer;border-radius:8px;}
.editor-toolbar button:active{background:var(--bg3);}
.pin-btn{margin-left:auto;}
.title-input{width:100%;background:none;border:none;color:var(--fg);font-family:var(--font);font-size:20px;font-weight:700;padding:16px 20px 8px;outline:none;}
.title-input::placeholder{color:var(--fg3);}
.body-input{flex:1;width:100%;background:none;border:none;color:var(--fg);font-family:var(--font);font-size:16px;padding:8px 20px;outline:none;resize:none;line-height:1.6;}
.body-input::placeholder{color:var(--fg3);}
.save-btn{margin:12px 20px;padding:15px;background:#fff;color:#000;border:none;border-radius:14px;font-family:var(--font);font-size:16px;font-weight:700;cursor:pointer;flex-shrink:0;}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-left">
    <div class="nx"><svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M11 88 L11 16 C11 13 13 10 16 10 L30 10 C33 10 35 12 35 15 L35 50 L65 15 C67 12 69 10 72 10 L84 10 C87 10 89 12 89 15 L89 85 C89 88 87 90 84 90 L70 90 C67 90 65 88 65 85 L65 50 L35 85 C33 88 31 90 28 90 L16 90 C13 90 11 88 11 88 Z" fill="currentColor"/></svg></div>
    <span class="hdr-title" id="t-title">Заметки</span>
  </div>
  <button class="icon-btn" onclick="openSheet(null)" style="background:var(--bg3);border:none;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:#fff;">＋</button>
</div>

<div class="search-bar">
  <span style="color:var(--fg3);font-size:16px">🔍</span>
  <input id="search-input" placeholder="Поиск..." oninput="filterNotes()">
</div>

<div class="notes-list" id="notes-list"><div class="empty"><span class="empty-icon">📝</span><span id="t-empty">Заметок пока нет</span></div></div>

<button class="fab" onclick="openSheet(null)">＋</button>

<!-- Editor Sheet -->
<div class="overlay" id="editor-overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="editor-toolbar">
      <button onclick="closeEditor()" style="font-size:14px;font-weight:500;" id="t-cancel">Отмена</button>
      <button id="pin-btn" class="pin-btn" onclick="togglePin()" style="font-size:18px">📌</button>
    </div>
    <input id="note-title" class="title-input" placeholder="Заголовок">
    <textarea id="note-body" class="body-input" placeholder="Заметка..."></textarea>
    <button class="save-btn" id="t-save" onclick="saveNote()">Сохранить</button>
  </div>
</div>

<script>
const tg=window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();}
function getUID(){try{const u=tg?.initDataUnsafe?.user?.id;if(u)return u;}catch(e){}const p=new URLSearchParams(location.search);if(p.get('uid'))return parseInt(p.get('uid'));return 0;}
const UID=getUID();

const I18N={
  ru:{title:'Заметки',empty:'Заметок пока нет',cancel:'Отмена',save:'Сохранить',search:'Поиск...'},
  en:{title:'Notes',empty:'No notes yet',cancel:'Cancel',save:'Save',search:'Search...'},
  uz:{title:'Eslatmalar',empty:'Hali eslatma yo\'q',cancel:'Bekor qilish',save:'Saqlash',search:'Qidirish...'},
  de:{title:'Notizen',empty:'Noch keine Notizen',cancel:'Abbrechen',save:'Speichern',search:'Suchen...'},
  zh:{title:'笔记',empty:'暂无笔记',cancel:'取消',save:'保存',search:'搜索...'},
  ar:{title:'الملاحظات',empty:'لا توجد ملاحظات',cancel:'إلغاء',save:'حفظ',search:'بحث...'},
};
let lang=localStorage.getItem('nx-lang')||'ru';
function t(k){return (I18N[lang]||I18N.en)[k]||k;}
function applyLang(){
  document.getElementById('t-title').textContent=t('title');
  document.getElementById('t-empty').textContent=t('empty');
  document.getElementById('t-cancel').textContent=t('cancel');
  document.getElementById('t-save').textContent=t('save');
  document.getElementById('search-input').placeholder=t('search');
}
applyLang();

async function api(method,path,body){
  try{
    const url=method==='GET'?path+(path.includes('?')?'&':'?')+'uid='+UID:path;
    const opts={method,headers:{'Content-Type':'application/json'}};
    if(body)opts.body=JSON.stringify({...body,uid:UID});
    return (await fetch(url,opts)).json();
  }catch(e){return{ok:false};}
}

let notes=[];
let editId=null;
let isPinned=false;

async function loadNotes(){
  const r=await api('GET','/api/notes');
  notes=r.data||[];
  renderNotes(notes);
}

function renderNotes(list){
  const el=document.getElementById('notes-list');
  if(!list.length){
    el.innerHTML=`<div class="empty"><span class="empty-icon">📝</span><span>${t('empty')}</span></div>`;
    return;
  }
  el.innerHTML=list.map(n=>`
    <div class="note-card" onclick="openSheet(${n.id})">
      ${n.pinned?'<span class="note-pin">📌</span>':''}
      <div class="note-title">${n.title||n.content.substring(0,40)}</div>
      <div class="note-body">${n.content}</div>
      <div class="note-date">${new Date(n.updated_at||n.created_at).toLocaleDateString()}</div>
    </div>`).join('');
}

function filterNotes(){
  const q=document.getElementById('search-input').value.toLowerCase();
  renderNotes(notes.filter(n=>(n.title||'').toLowerCase().includes(q)||(n.content||'').toLowerCase().includes(q)));
}

function openSheet(id){
  editId=id;
  if(id){
    const n=notes.find(x=>x.id===id);
    document.getElementById('note-title').value=n?.title||'';
    document.getElementById('note-body').value=n?.content||'';
    isPinned=!!(n?.pinned);
  }else{
    document.getElementById('note-title').value='';
    document.getElementById('note-body').value='';
    isPinned=false;
    // Auto-open if ?new=1
  }
  document.getElementById('pin-btn').textContent=isPinned?'📌':'📍';
  document.getElementById('editor-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('note-body').focus(),400);
}

function closeEditor(){document.getElementById('editor-overlay').classList.remove('open');}

function togglePin(){isPinned=!isPinned;document.getElementById('pin-btn').textContent=isPinned?'📌':'📍';}

async function saveNote(){
  const title=document.getElementById('note-title').value.trim();
  const content=document.getElementById('note-body').value.trim();
  if(!content)return;
  if(editId){
    await api('PUT',`/api/notes/${editId}`,{title,content,pinned:isPinned});
  }else{
    await api('POST','/api/notes',{title,content,pinned:isPinned});
  }
  closeEditor();
  loadNotes();
}

document.getElementById('editor-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('editor-overlay'))closeEditor();});

// Auto-open if new=1
const params=new URLSearchParams(location.search);
if(params.get('new')==='1')setTimeout(()=>openSheet(null),300);

loadNotes();
</script>
</body>
</html>
