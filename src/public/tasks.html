<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20viewBox%3D%270%200%2032%2032%27%3E%3Crect%20width%3D%2732%27%20height%3D%2732%27%20rx%3D%277%27%20fill%3D%27black%27/%3E%3Cpath%20d%3D%27M6%2027L6%205C6%205%207%204%208%204L11%204C12%204%2013%205%2013%205L13%2017L19%205C20%204%2021%204%2022%204L24%204C25%204%2026%205%2026%205L26%2027C26%2027%2025%2028%2024%2028L21%2028C20%2028%2019%2027%2019%2027L19%2015L13%2027C12%2028%2011%2028%2010%2028L8%2028C7%2028%206%2027%206%2027Z%27%20fill%3D%27white%27/%3E%3C/svg%3E">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>NEXUM Tasks</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--bg:#000;--bg2:#111;--bg3:#1c1c1e;--bg4:#2c2c2e;--fg:#fff;--fg2:rgba(255,255,255,0.55);--fg3:rgba(255,255,255,0.25);--sep:rgba(255,255,255,0.07);--r:16px;--font:-apple-system,'SF Pro Display',system-ui,sans-serif;--crit:#ff453a;--high:#ff9f0a;--med:#ffd60a;--low:#30d158;}
html,body{height:100%;background:var(--bg);color:var(--fg);font-family:var(--font);-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{display:none;}
.hdr{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;}
.hdr-left{display:flex;align-items:center;gap:10px;}


.hdr-title{font-size:18px;font-weight:700;}
.filter-bar{display:flex;gap:6px;padding:0 20px 16px;overflow-x:auto;}
.filter-btn{padding:6px 14px;border-radius:20px;border:none;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;background:var(--bg3);color:var(--fg2);white-space:nowrap;}
.filter-btn.act{background:#fff;color:#000;}
.tasks-list{padding:0 20px;display:flex;flex-direction:column;gap:8px;padding-bottom:100px;}
.task-row{background:var(--bg3);border-radius:var(--r);padding:14px 16px;display:flex;align-items:flex-start;gap:12px;cursor:pointer;}
.task-row:active{background:var(--bg4);}
.task-check{width:24px;height:24px;border-radius:50%;border:2px solid var(--fg3);flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;}
.task-check.done{background:#fff;border-color:#fff;}
.task-check.done::after{content:'✓';color:#000;font-size:13px;font-weight:700;}
.task-body{flex:1;}
.task-title{font-size:15px;font-weight:500;line-height:1.3;}
.task-title.done-text{text-decoration:line-through;color:var(--fg3);}
.task-meta{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;}
.priority-badge{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;}
.pri-critical{background:var(--crit)20;color:var(--crit);}
.pri-high{background:var(--high)20;color:var(--high);}
.pri-medium{background:var(--med)20;color:var(--med);}
.pri-low{background:var(--low)20;color:var(--low);}
.task-project{font-size:11px;color:var(--fg3);}
.fab{position:fixed;bottom:30px;right:20px;width:52px;height:52px;background:#fff;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,0.5);cursor:pointer;z-index:100;font-size:24px;}
.empty{text-align:center;padding:80px 20px;color:var(--fg2);}
.empty-icon{font-size:52px;opacity:0.3;display:block;margin-bottom:16px;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.overlay.open{opacity:1;pointer-events:all;}
.sheet{background:var(--bg2);border-radius:24px 24px 0 0;width:100%;padding-bottom:env(safe-area-inset-bottom,24px);transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);}
.overlay.open .sheet{transform:translateY(0);}
.sheet-handle{width:36px;height:4px;background:var(--bg4);border-radius:2px;margin:12px auto;}
.sheet-title{font-size:18px;font-weight:700;padding:4px 20px 16px;}
.field{padding:14px 20px;border-top:0.5px solid var(--sep);}
.field label{font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--fg2);display:block;margin-bottom:8px;}
.field input,.field select{width:100%;background:var(--bg3);border:none;border-radius:10px;padding:12px 14px;color:#fff;font-family:var(--font);font-size:15px;outline:none;}
.field select option{background:#1c1c1e;}
.seg{display:flex;background:var(--bg3);border-radius:12px;padding:3px;margin:0 20px 4px;}
.seg-btn{flex:1;padding:8px;border-radius:9px;border:none;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;background:transparent;color:var(--fg2);}
.seg-btn.act{background:#fff;color:#000;}
.save-btn{width:calc(100%-40px);margin:16px 20px;padding:15px;background:#fff;color:#000;border:none;border-radius:14px;font-family:var(--font);font-size:16px;font-weight:700;cursor:pointer;}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-left">
    
    <span class="hdr-title" id="t-title">Задачи</span>
  </div>
</div>
<div class="filter-bar" id="filter-bar"></div>
<div class="tasks-list" id="tasks-list"></div>
<button class="fab" onclick="openAdd()">＋</button>

<!-- Add task sheet -->
<div class="overlay" id="add-overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="t-new-task">Новая задача</div>
    <div class="field">
      <label id="t-label-title">НАЗВАНИЕ</label>
      <input id="task-title" placeholder="Что нужно сделать...">
    </div>
    <div class="field" style="padding-top:12px;">
      <label id="t-label-priority">ПРИОРИТЕТ</label>
      <div class="seg">
        <button class="seg-btn" onclick="setPri('critical')" id="p-crit">🔴</button>
        <button class="seg-btn" onclick="setPri('high')" id="p-high">🟠</button>
        <button class="seg-btn act" onclick="setPri('medium')" id="p-med">🟡</button>
        <button class="seg-btn" onclick="setPri('low')" id="p-low">🟢</button>
      </div>
    </div>
    <div class="field">
      <label id="t-label-project">ПРОЕКТ</label>
      <input id="task-project" placeholder="General">
    </div>
    <button class="save-btn" id="t-save" onclick="saveTask()">Создать</button>
  </div>
</div>

<script>
const tg=window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();}
function getUID(){try{const u=tg?.initDataUnsafe?.user?.id;if(u)return u;}catch(e){}const p=new URLSearchParams(location.search);if(p.get('uid'))return parseInt(p.get('uid'));return 0;}
const UID=getUID();

const FILTERS=['all','todo','done'];
const PRI_COLORS={critical:'crit',high:'high',medium:'med',low:'low'};
const I18N={
  ru:{title:'Задачи',all:'Все',todo:'Активные',done:'Выполненные',newTask:'Новая задача',labelTitle:'НАЗВАНИЕ',labelPri:'ПРИОРИТЕТ',labelProj:'ПРОЕКТ',save:'Создать',empty:'Задач пока нет'},
  en:{title:'Tasks',all:'All',todo:'Active',done:'Done',newTask:'New task',labelTitle:'TITLE',labelPri:'PRIORITY',labelProj:'PROJECT',save:'Create',empty:'No tasks yet'},
  uz:{title:'Vazifalar',all:'Hammasi',todo:'Faol',done:'Bajarilgan',newTask:'Yangi vazifa',labelTitle:'NOMI',labelPri:'USTUVORLIK',labelProj:'LOYIHA',save:'Yaratish',empty:'Hali vazifa yo\'q'},
  de:{title:'Aufgaben',all:'Alle',todo:'Aktiv',done:'Erledigt',newTask:'Neue Aufgabe',labelTitle:'TITEL',labelPri:'PRIORITÄT',labelProj:'PROJEKT',save:'Erstellen',empty:'Noch keine Aufgaben'},
  zh:{title:'任务',all:'全部',todo:'进行中',done:'已完成',newTask:'新任务',labelTitle:'标题',labelPri:'优先级',labelProj:'项目',save:'创建',empty:'暂无任务'},
  ar:{title:'المهام',all:'الكل',todo:'نشط',done:'مكتمل',newTask:'مهمة جديدة',labelTitle:'العنوان',labelPri:'الأولوية',labelProj:'المشروع',save:'إنشاء',empty:'لا توجد مهام'},
};
let lang=localStorage.getItem('nx-lang')||'ru';
function t(k){return (I18N[lang]||I18N.en)[k]||k;}

let tasks=[];
let filter='all';
let priority='medium';

async function api(method,path,body){
  try{const url=method==='GET'?path+(path.includes('?')?'&':'?')+'uid='+UID:path;const opts={method,headers:{'Content-Type':'application/json'}};if(body)opts.body=JSON.stringify({...body,uid:UID});return (await fetch(url,opts)).json();}catch(e){return{ok:false};}
}

function applyLang(){
  document.getElementById('t-title').textContent=t('title');
  document.getElementById('t-new-task').textContent=t('newTask');
  document.getElementById('t-label-title').textContent=t('labelTitle');
  document.getElementById('t-label-priority').textContent=t('labelPri');
  document.getElementById('t-label-project').textContent=t('labelProj');
  document.getElementById('t-save').textContent=t('save');
  renderFilterBar();
}

function renderFilterBar(){
  const labels={all:t('all'),todo:t('todo'),done:t('done')};
  document.getElementById('filter-bar').innerHTML=FILTERS.map(f=>`<button class="filter-btn${f===filter?' act':''}" onclick="setFilter('${f}')">${labels[f]}</button>`).join('');
}

function setFilter(f){filter=f;renderFilterBar();renderTasks();}

async function loadTasks(){
  const r=await api('GET','/api/tasks');
  tasks=r.data||[];
  renderTasks();
}

function renderTasks(){
  const list=tasks.filter(t=>filter==='all'||t.status===filter||(filter==='todo'&&t.status!=='done'));
  const el=document.getElementById('tasks-list');
  if(!list.length){el.innerHTML=`<div class="empty"><span class="empty-icon">✅</span><span>${t('empty')}</span></div>`;return;}
  el.innerHTML=list.map(task=>{
    const done=task.status==='done';
    const pri=task.priority||'medium';
    return `<div class="task-row" onclick="toggleTask(${task.id})">
      <div class="task-check${done?' done':''}"></div>
      <div class="task-body">
        <div class="task-title${done?' done-text':''}">${task.title}</div>
        <div class="task-meta">
          <span class="priority-badge pri-${PRI_COLORS[pri]||'med'}">${pri}</span>
          <span class="task-project">${task.project||''}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function toggleTask(id){
  const task=tasks.find(t=>t.id===id);
  if(!task)return;
  const newStatus=task.status==='done'?'todo':'done';
  await api('PUT',`/api/tasks/${id}`,{status:newStatus});
  task.status=newStatus;
  renderTasks();
}

function openAdd(){
  document.getElementById('task-title').value='';
  document.getElementById('task-project').value='';
  setPri('medium');
  document.getElementById('add-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('task-title').focus(),400);
}

function setPri(p){
  priority=p;
  ['crit','high','med','low'].forEach(x=>document.getElementById('p-'+x).classList.remove('act'));
  document.getElementById('p-'+(p==='critical'?'crit':p==='medium'?'med':p)).classList.add('act');
}

async function saveTask(){
  const title=document.getElementById('task-title').value.trim();
  if(!title)return;
  await api('POST','/api/tasks',{title,project:document.getElementById('task-project').value||'General',priority});
  document.getElementById('add-overlay').classList.remove('open');
  loadTasks();
}

document.getElementById('add-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('add-overlay'))document.getElementById('add-overlay').classList.remove('open');});

const params=new URLSearchParams(location.search);
if(params.get('new')==='1')setTimeout(()=>openAdd(),300);

applyLang();
loadTasks();
</script>
</body>
</html>
