<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20viewBox%3D%270%200%2032%2032%27%3E%3Crect%20width%3D%2732%27%20height%3D%2732%27%20rx%3D%277%27%20fill%3D%27black%27/%3E%3Cpath%20d%3D%27M6%2027L6%205C6%205%207%204%208%204L11%204C12%204%2013%205%2013%205L13%2017L19%205C20%204%2021%204%2022%204L24%204C25%204%2026%205%2026%205L26%2027C26%2027%2025%2028%2024%2028L21%2028C20%2028%2019%2027%2019%2027L19%2015L13%2027C12%2028%2011%2028%2010%2028L8%2028C7%2028%206%2027%206%2027Z%27%20fill%3D%27white%27/%3E%3C/svg%3E">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>NEXUM — Инструменты</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{--font:-apple-system,system-ui,sans-serif;--t:0.22s cubic-bezier(0.25,0.46,0.45,0.94);}
[data-theme="dark"]{--bg:#000;--s:#1c1c1e;--s2:#2c2c2e;--s3:#3a3a3c;--b:rgba(255,255,255,0.07);--t1:#fff;--t2:rgba(255,255,255,0.55);--t3:rgba(255,255,255,0.25);--accent:#30d158;}
[data-theme="light"]{--bg:#f2f2f7;--s:#fff;--s2:#f2f2f7;--s3:#e5e5ea;--b:rgba(0,0,0,0.06);--t1:#000;--t2:rgba(0,0,0,0.5);--t3:rgba(0,0,0,0.22);--accent:#34c759;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
::-webkit-scrollbar{display:none;}
body{font-family:var(--font);background:var(--bg);color:var(--t1);min-height:100vh;padding-bottom:30px;}
.hdr{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:0.5px solid var(--b);padding:12px 18px 10px;display:flex;align-items:center;gap:10px;backdrop-filter:blur(20px);}
.hdr-title{font-size:17px;font-weight:600;flex:1;}
.badge{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px;}
.section{padding:16px 16px 0;}
.slabel{font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--t2);padding:0 2px 8px;}
.card{background:var(--s);border-radius:16px;overflow:hidden;border:0.5px solid var(--b);margin-bottom:12px;}
.tool-row{display:flex;align-items:flex-start;gap:12px;padding:14px;}
.tool-icon{width:44px;height:44px;background:linear-gradient(135deg,#30d158,#007aff);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.tool-body{flex:1;min-width:0;}
.tool-name{font-size:15px;font-weight:600;margin-bottom:3px;}
.tool-desc{font-size:13px;color:var(--t2);margin-bottom:6px;line-height:1.4;}
.tool-trigger{font-size:11px;color:var(--t3);font-family:monospace;background:var(--s2);padding:3px 8px;border-radius:6px;display:inline-block;}
.tool-stats{font-size:11px;color:var(--t3);margin-top:4px;}
.tool-actions{display:flex;gap:8px;margin-top:10px;}
.tbtn{flex:1;padding:8px;background:var(--s2);border:none;border-radius:10px;color:var(--t1);font-size:12px;font-weight:500;cursor:pointer;}
.tbtn.del{color:#ff3b30;}
.empty{text-align:center;padding:80px 20px;}
.empty-icon{font-size:52px;opacity:0.3;margin-bottom:12px;}
.empty p{font-size:15px;color:var(--t2);line-height:1.5;}
.empty small{font-size:13px;color:var(--t3);margin-top:8px;display:block;}
.info-box{background:var(--s);border-radius:16px;padding:16px;margin:0 16px 16px;border:0.5px solid var(--b);}
.info-box h3{font-size:15px;font-weight:600;margin-bottom:8px;}
.info-box p{font-size:13px;color:var(--t2);line-height:1.5;}
.example{background:var(--s2);border-radius:10px;padding:10px 12px;margin-top:10px;font-size:13px;color:var(--accent);}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-title">🛠 Инструменты</div>
  <span class="badge" id="count">0</span>
</div>

<div class="info-box">
  <h3>🤖 Самообучающийся NEXUM</h3>
  <p>Создавай новые инструменты прямо в чате. NEXUM напишет код и сразу подключит его.</p>
  <div class="example">/newtool конвертер валют<br>/newtool генератор паролей<br>/newtool трекер сна</div>
</div>

<div id="main"></div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

const dark = !tg || tg.colorScheme !== 'light';
document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');

function resolveUID() {
  try { const u = tg?.initDataUnsafe?.user?.id; if (u) return u; } catch {}
  const p = new URLSearchParams(location.search);
  if (p.get('uid')) return parseInt(p.get('uid'));
  return 0;
}
const UID = resolveUID();

async function api(method, path, body) {
  try {
    const sep = path.includes('?') ? '&' : '?';
    const url = method === 'GET' ? path + sep + 'uid=' + UID : path;
    const opts = { method, headers: {'Content-Type': 'application/json'} };
    if (body) opts.body = JSON.stringify({...body, uid: UID});
    const r = await fetch(url, opts);
    return r.json();
  } catch(e) {
    return { ok: false, error: e.message };
  }
}

const icons = ['🔧','⚡','🎯','💡','🔮','🛸','🎪','🎲','🔬','📡'];

async function load() {
  const main = document.getElementById('main');
  
  const data = await api('GET', '/api/tools');
  if (!data.ok || !data.data?.length) {
    main.innerHTML = `<div class="empty">
      <div class="empty-icon">🛠</div>
      <p>Инструментов пока нет</p>
      <small>Создай первый инструмент<br>командой <b>/newtool описание</b></small>
    </div>`;
    document.getElementById('count').textContent = '0';
    return;
  }

  const tools = data.data;
  document.getElementById('count').textContent = tools.length;

  const html = `<div class="section">
    <div class="slabel">Активные инструменты (${tools.length})</div>
    <div class="card">${tools.map((t, i) => `
      <div class="tool-row" style="${i > 0 ? 'border-top:0.5px solid var(--b)' : ''}">
        <div class="tool-icon">${icons[i % icons.length]}</div>
        <div class="tool-body">
          <div class="tool-name">${t.name}</div>
          <div class="tool-desc">${t.description}</div>
          <div class="tool-trigger">${t.trigger_pattern}</div>
          <div class="tool-stats">Использован ${t.usage_count} раз</div>
          <div class="tool-actions">
            <button class="tbtn del" onclick="deleteTool(${t.id}, this)">🗑 Удалить</button>
          </div>
        </div>
      </div>
    `).join('')}</div>
  </div>`;

  main.innerHTML = html;
}

async function deleteTool(id, btn) {
  btn.textContent = '...';
  await api('DELETE', '/api/tools/' + id);
  load();
}

load();
</script>
</body>
</html>
